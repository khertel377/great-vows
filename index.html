<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Vows</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #05060f;
    --text: #ffffff;
    --text-next: rgba(255,255,255,0.35);
    --text-dim: rgba(255,255,255,0.08);
    --accent: #2a3fcc;
    --gold: #c8a96e;
    --gold-dim: rgba(200,169,110,0.4);
    --ui: rgba(255,255,255,0.12);
    --ui-hover: rgba(255,255,255,0.2);
    --sangha-color: #2a3fcc;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* ── CANVAS ── */
  #waveCanvas { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.3; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); }

  /* ── SCREENS ── */
  .screen { position: fixed; inset: 0; z-index: 10; transition: opacity 0.6s ease; }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ══════════════════════════════
     INDEX SCREEN
  ══════════════════════════════ */
  #indexScreen {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 56px 6vw 80px;
    scrollbar-width: none;
  }
  #indexScreen::-webkit-scrollbar { display: none; }

  .index-header { margin-bottom: 48px; }
  .index-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 12px;
    opacity: 0; animation: fadeUp 0.8s ease 0.1s forwards;
  }
  .index-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(40px, 7vw, 80px);
    line-height: 1; letter-spacing: -0.02em;
    opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards;
  }
  .index-sub {
    font-family: 'DM Serif Display', serif; font-style: italic;
    font-size: clamp(14px, 2vw, 18px); color: rgba(255,255,255,0.4);
    margin-top: 8px;
    opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards;
  }

  /* ── SANGHA SWITCHER ── */
  .sangha-switcher {
    display: flex;
    gap: 8px;
    margin-bottom: 48px;
    flex-wrap: wrap;
    opacity: 0; animation: fadeUp 0.8s ease 0.32s forwards;
  }
  .sangha-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 2px;
    border: 1px solid var(--ui);
    background: transparent;
    color: rgba(255,255,255,0.35);
    cursor: pointer;
    transition: all 0.2s;
  }
  .sangha-btn:hover {
    border-color: var(--ui-hover);
    color: rgba(255,255,255,0.7);
  }
  .sangha-btn.active {
    border-color: var(--sangha-color);
    color: #fff;
    background: rgba(255,255,255,0.04);
  }

  /* service stacks */
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--gold-dim);
    margin-bottom: 16px; margin-top: 48px;
    opacity: 0; animation: fadeUp 0.8s ease 0.35s forwards;
  }
  .service-cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px; margin-bottom: 8px;
    opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards;
  }
  .service-card {
    border: 1px solid var(--gold-dim); border-radius: 3px;
    padding: 18px 20px; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .service-card:hover { background: rgba(200,169,110,0.06); border-color: var(--gold); }
  .service-card-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .service-card-desc { font-size: 12px; color: rgba(255,255,255,0.35); }

  /* chant list */
  .chant-section { margin-top: 40px; opacity: 0; animation: fadeUp 0.8s ease 0.45s forwards; }
  .chant-section-name {
    font-size: 10px; font-weight: 600; letter-spacing: 0.3em;
    text-transform: uppercase; color: rgba(255,255,255,0.2);
    margin-bottom: 8px; padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .chant-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer; transition: opacity 0.2s;
  }
  .chant-row:hover { opacity: 0.75; }
  .chant-row-left { display: flex; flex-direction: column; gap: 3px; }
  .chant-row-title { font-size: 15px; font-weight: 500; }
  .chant-row-subtitle { font-size: 12px; color: rgba(255,255,255,0.35); font-style: italic; }
  .chant-row-right { display: flex; align-items: center; gap: 8px; }
  .chant-has-audio {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold); opacity: 0.7;
  }
  .chant-arrow { color: rgba(255,255,255,0.2); font-size: 14px; }

  /* ══════════════════════════════
     CHANT SCREEN
  ══════════════════════════════ */
  #chantScreen { background: transparent; }

  #chantStage {
    position: absolute; inset: 0; overflow: hidden;
    display: flex; align-items: flex-start; padding-left: 8vw;
  }
  #chantTrack {
    display: flex; flex-direction: column;
    align-items: flex-start; will-change: transform;
  }
  .chant-line {
    display: block; font-family: 'DM Sans', sans-serif;
    font-size: clamp(24px, 5vw, 50px); font-weight: 700;
    line-height: 1.3; letter-spacing: -0.01em;
    white-space: pre-line; padding: 8px 0;
    color: var(--text);
    transition: opacity 0.8s ease;
  }
  .chant-line.active    { opacity: 1; }
  .chant-line.next      { opacity: 0.4; }
  .chant-line.near-next { opacity: 0.15; }
  .chant-line.past      { opacity: 0.2; }
  .chant-line.near-past { opacity: 0.1; }
  .chant-line.hidden, .chant-line.future { opacity: 0; }
  #chantScreen.spotlight .chant-line.next      { opacity: 0.15; }
  #chantScreen.spotlight .chant-line.near-next { opacity: 0; }
  #chantScreen.spotlight .chant-line.past      { opacity: 0; }
  #chantScreen.spotlight .chant-line.near-past { opacity: 0; }
  .chant-line.is-cue.next      { opacity: 0.3; }
  .chant-line.is-cue.past,
  .chant-line.is-cue.near-past { opacity: 0; transition: opacity 0s; }
  .section-gap { height: 56px; }
  .large-section-gap { height: 64px; }
  .title-gap { height: 80px; }

  /* top bar */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 28px; z-index: 20;
    background: linear-gradient(to bottom, rgba(5,6,15,0.9) 0%, transparent 100%);
  }
  .top-bar-left { display: flex; align-items: center; gap: 16px; }
  .back-btn {
    background: none; border: 1px solid var(--ui); color: rgba(255,255,255,0.5);
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    letter-spacing: 0.1em; padding: 7px 14px; cursor: pointer;
    border-radius: 2px; transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--ui-hover); color: #fff; }
  .chant-title-display {
    font-family: 'DM Serif Display', serif; font-style: italic;
    font-size: 14px; color: rgba(255,255,255,0.3);
  }
  .lineage-tag {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.15); font-weight: 500;
  }

  /* controls */
  .controls {
    position: fixed; bottom: 64px; right: 24px;
    display: flex; gap: 10px; z-index: 20;
  }
  .ctrl-btn {
    width: 42px; height: 42px; border-radius: 50%;
    border: 1px solid var(--ui); background: rgba(5,6,15,0.6);
    color: rgba(255,255,255,0.6); font-size: 15px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; backdrop-filter: blur(8px);
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: var(--ui-hover); }

  /* scrub bar */
  #scrubRow {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 44px;
    padding: 0 24px; box-sizing: border-box;
    display: flex; align-items: center; gap: 10px; z-index: 30;
  }
  .scrub-time {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.3); white-space: nowrap; min-width: 28px;
    pointer-events: none; user-select: none;
  }
  #seekWrap {
    flex: 1; height: 44px; position: relative;
    display: flex; align-items: center; cursor: pointer;
  }
  #seekTrackBg, #seekTrackFill {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    height: 4px; border-radius: 2px; pointer-events: none; z-index: 0;
    transition: height 0.2s ease;
  }
  #seekTrackBg { width: 100%; background: rgba(255,255,255,0.12); }
  #seekTrackFill { width: 0%; background: var(--accent); }
  #seekWrap:hover #seekTrackBg,
  #seekWrap:hover #seekTrackFill { height: 6px; }
  #seekThumb {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); opacity: 0.8; pointer-events: none;
    transition: transform 0.15s ease, opacity 0.15s ease;
    left: 0%;
  }
  #seekWrap:hover #seekThumb,
  #seekWrap.dragging #seekThumb { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }

  /* tap hint */
  .tap-hint {
    position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.15); z-index: 20;
    animation: pulse 3s ease infinite; display: none;
    pointer-events: none;
  }

  /* audio load banner */
  .audio-banner {
    position: fixed; bottom: 64px; left: 24px;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--gold); opacity: 0.7; z-index: 20;
    display: none;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.4; } }

  /* ── LISTENING MODE ── */
  .listening-overlay {
    position: fixed; inset: 0; z-index: 15;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px; text-align: center; padding: 40px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.7s ease;
  }
  .listening-overlay.active { opacity: 1; pointer-events: auto; }
  .listening-svc-title {
    font-family: 'DM Serif Display', serif; font-style: italic;
    font-size: clamp(22px, 4vw, 44px);
    color: rgba(255,255,255,0.85);
  }
  .listening-pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    animation: pulse 2.4s ease infinite;
  }
  .listening-names {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    margin-top: 4px;
  }
  .listening-names span { font-size: 13px; color: rgba(255,255,255,0.2); letter-spacing: 0.03em; }
</style>
</head>
<body>

<canvas id="waveCanvas"></canvas>

<!-- INDEX -->
<div class="screen" id="indexScreen">
  <div class="index-header">
    <div class="index-eyebrow" id="indexEyebrow">Great Vows</div>
    <div class="index-title" id="indexTitle">Daily Sutras</div>
    <div class="index-sub" id="indexSub">Verses and Texts</div>
  </div>

  <!-- SANGHA SWITCHER -->
  <div class="sangha-switcher" id="sanghaSwitcher"></div>

  <div class="section-label" id="servicesLabel">Services</div>
  <div class="service-cards" id="serviceCards"></div>
  <div id="chantList"></div>
</div>

<!-- CHANT -->
<div class="screen hidden" id="chantScreen">
  <div class="top-bar">
    <div class="top-bar-left">
      <button class="back-btn" onclick="goIndex()">&#8592; Back</button>
      <div class="chant-title-display" id="chantTitleDisplay"></div>
    </div>
    <div class="lineage-tag" id="lineageTag"></div>
  </div>
  <div id="chantStage">
    <div id="chantTrack"></div>
  </div>
  <div class="listening-overlay" id="listeningOverlay"></div>
  <div class="controls" id="controls">
    <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlayPause()">&#9654;</button>
    <button class="ctrl-btn" onclick="restartChant()">&#8635;</button>
  </div>
  <div id="scrubRow">
    <span class="scrub-time" id="seekCurrentTime">0:00</span>
    <div id="seekWrap">
      <div id="seekTrackBg"></div>
      <div id="seekTrackFill"></div>
      <div id="seekThumb"></div>
    </div>
    <span class="scrub-time" id="seekDuration">–:––</span>
  </div>
  <div class="tap-hint" id="tapHint">tap to advance</div>
  <div class="audio-banner" id="audioBanner">&#9679; Recording loaded</div>
</div>

<audio id="audioPlayer"></audio>

<script>
// ══════════════════════════════
// STATE
// ══════════════════════════════
var MANIFEST = null;       // chantbook.json
var SANGHAS = {};          // id -> sangha data object
var currentSangha = null;  // active sangha object
var currentChant = null;
var currentIndex = 0;
var hasAudio = false;
var listeningMode = false;
var isPlaying = false;
var tweenRaf = null;
var isScrubbing = false;
var scrubTimer = null;
var _trackWindowEnd = 0;
var lineTranslates = {};
var currentBoost = 1.0;
var currentSpeedBoost = 1.0;
var audioEl = document.getElementById('audioPlayer');

function formatTime(s) {
  s = Math.floor(s || 0);
  return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
}

function updateSeekBar(pct) {
  pct = Math.max(0, Math.min(1, pct));
  document.getElementById('seekTrackFill').style.width = (pct * 100).toFixed(1) + '%';
  document.getElementById('seekThumb').style.left = (pct * 100).toFixed(1) + '%';
  if (audioEl.duration) {
    document.getElementById('seekCurrentTime').textContent = formatTime(pct * audioEl.duration);
  }
}


// ══════════════════════════════
// BOOT — load manifest then sanghas
// ══════════════════════════════
fetch('chantbook.json')
  .then(function(r) { return r.json(); })
  .then(function(manifest) {
    MANIFEST = manifest;
    // fetch all sangha files in parallel
    var fetches = manifest.sanghas.map(function(s) {
      return fetch(s.file)
        .then(function(r) { return r.json(); })
        .then(function(data) { SANGHAS[s.id] = data; });
    });
    return Promise.all(fetches);
  })
  .then(function() {
    buildSwitcher();
    // default to first sangha
    switchSangha(MANIFEST.sanghas[0].id);
  })
  .catch(function(err) {
    console.error('Could not load chantbook.json:', err);
    document.getElementById('indexScreen').innerHTML = '<div style="padding:60px;color:rgba(255,255,255,0.4);font-size:14px;">Could not load chantbook.json — make sure you are running from a local server (python3 -m http.server 8000) and the file structure matches the README.</div>';
  });

// ══════════════════════════════
// SANGHA SWITCHER
// ══════════════════════════════
function buildSwitcher() {
  var el = document.getElementById('sanghaSwitcher');
  el.innerHTML = '';
  MANIFEST.sanghas.forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'sangha-btn';
    btn.id = 'sangha-btn-' + s.id;
    btn.textContent = s.shortName;
    btn.onclick = function() { switchSangha(s.id); };
    el.appendChild(btn);
  });
}

function switchSangha(id) {
  currentSangha = SANGHAS[id];
  var meta = MANIFEST.sanghas.find(function(s) { return s.id === id; });

  // update accent color from sangha color
  document.documentElement.style.setProperty('--sangha-color', meta.color);
  document.documentElement.style.setProperty('--accent', meta.color);

  // update active button
  MANIFEST.sanghas.forEach(function(s) {
    var btn = document.getElementById('sangha-btn-' + s.id);
    if (btn) btn.classList.toggle('active', s.id === id);
  });

  // update header
  document.getElementById('indexTitle').textContent = currentSangha.name;
  document.getElementById('indexSub').textContent = currentSangha.tradition || '';
  document.getElementById('lineageTag').textContent = meta.shortName + ' \u00b7 ' + (currentSangha.lineage || []).join('/');

  // rebuild index content for this sangha
  buildIndex();
}

// ══════════════════════════════
// INDEX
// ══════════════════════════════
function buildIndex() {
  var DATA = currentSangha;

  // services — only show services that have a description or audio
  // (filters out stubs that aren't ready yet)
  var svcEl = document.getElementById('serviceCards');
  svcEl.innerHTML = '';
  var servicesLabel = document.getElementById('servicesLabel');

  var visibleServices = (DATA.services || []).filter(function(s) {
    return s.description || s.audio;
  });

  servicesLabel.style.display = visibleServices.length > 0 ? '' : 'none';

  visibleServices.forEach(function(svc) {
    var card = document.createElement('div');
    card.className = 'service-card';
    card.innerHTML = '<div class="service-card-title">' + svc.title + '</div>'
      + (svc.description ? '<div class="service-card-desc">' + svc.description + '</div>' : '');
    card.onclick = function() { loadService(svc); };
    svcEl.appendChild(card);
  });

  // chants grouped by section
  var sections = {};
  var sectionOrder = [];
  (DATA.chants || []).forEach(function(c) {
    var s = c.section || 'Other';
    if (!sections[s]) { sections[s] = []; sectionOrder.push(s); }
    sections[s].push(c);
  });

  var listEl = document.getElementById('chantList');
  listEl.innerHTML = '';
  sectionOrder.forEach(function(sectionName) {
    var sec = document.createElement('div');
    sec.className = 'chant-section';
    sec.innerHTML = '<div class="chant-section-name">' + sectionName + '</div>';
    sections[sectionName].forEach(function(c) {
      var row = document.createElement('div');
      row.className = 'chant-row';
      row.innerHTML = '<div class="chant-row-left">'
        + '<div class="chant-row-title">' + c.title + '</div>'
        + (c.subtitle ? '<div class="chant-row-subtitle">' + c.subtitle + '</div>' : '')
        + '</div>'
        + '<div class="chant-row-right">'
        + (c.audio ? '<div class="chant-has-audio" title="Audio available"></div>' : '')
        + '<div class="chant-arrow">›</div>'
        + '</div>';
      row.onclick = function() { openChant(c); };
      sec.appendChild(row);
    });
    listEl.appendChild(sec);
  });
}

// ══════════════════════════════
// SERVICE LOADER
// builds a virtual chant from a service's items array
// handles type:chant items; skips silence/ceremonial for now
// ══════════════════════════════
function loadService(svc) {
  var DATA = currentSangha;
  var lines = [];

  // support both old format (chants:[]) and new format (items:[])
  var ids = svc.chants || [];
  if (svc.items) {
    ids = svc.items
      .filter(function(item) { return item.type === 'chant'; })
      .map(function(item) { return item.id; });
  }

  var chantNames = [];
  var chantEndTimes = {};
  if (svc.timestampMap && svc.timestampMap.length > 0) {
    // apply manual corrections on top of auto-generated timestamps
    var corrections = svc.timestampCorrections || {};
    svc.timestampMap.forEach(function(entry) {
      var chantCorrections = corrections[entry.chantId];
      if (chantCorrections) {
        var corrMap = {};
        chantCorrections.forEach(function(c) { corrMap[c.lineIndex] = c.cueIn; });
        entry.lines.forEach(function(l) {
          if (corrMap[l.lineIndex] !== undefined) l.cueIn = corrMap[l.lineIndex];
        });
      }
    });

    svc.timestampMap.forEach(function(entry, i) {
      var chant = DATA.chants.find(function(c) { return c.id === entry.chantId; });
      if (!chant) return;
      chantNames.push(chant.title);
      if (i > 0) { lines.push({ text: null }); lines.push({ text: null }); }
      entry.lines.forEach(function(mapped) {
        var orig = chant.lines[mapped.lineIndex];
        lines.push({ text: orig ? orig.text : null, cueIn: mapped.cueIn, chantId: entry.chantId });
      });
    });

    // build chantEndTimes: endTime for each chant (used to dim all lines after chant ends)
    svc.timestampMap.forEach(function(entry, i) {
      var lastLines = entry.lines;
      var lastCueIn = lastLines.length > 0 ? lastLines[lastLines.length - 1].cueIn : entry.startTime;
      var endTime;
      if (i < svc.timestampMap.length - 1) {
        endTime = lastCueIn + 3;
      } else {
        endTime = svc.duration !== undefined ? svc.duration : lastCueIn + 10;
      }
      chantEndTimes[entry.chantId] = endTime;
    });
  } else {
    ids.forEach(function(id, i) {
      var chant = DATA.chants.find(function(c) { return c.id === id; });
      if (!chant) return;
      chantNames.push(chant.title);
      if (i > 0) { lines.push({ text: null }); lines.push({ text: null }); }
      chant.lines.forEach(function(l) { lines.push(l); });
    });
  }

  // collect ceremony cues from all ceremonial items
  var ceremonyCues = [];
  (svc.items || []).forEach(function(item) {
    if (item.type === 'ceremonial' && item.cues) {
      item.cues.forEach(function(c) { ceremonyCues.push(c); });
    }
  });
  ceremonyCues.sort(function(a, b) { return a.time - b.time; });

  // auto-generate announcement cues from doshi items
  if (svc.timestampMap && svc.timestampMap.length > 0) {
    var tmLookup = {};
    svc.timestampMap.forEach(function(entry) { tmLookup[entry.chantId] = entry.startTime; });
    var svcItems = svc.items || [];
    for (var di = 0; di < svcItems.length; di++) {
      if (svcItems[di].type !== 'doshi') continue;
      var nextChantId = null;
      var nextChantItem = null;
      var nextChantPos = -1;
      for (var ci2 = di + 1; ci2 < svcItems.length; ci2++) {
        if (svcItems[ci2].type === 'chant') { nextChantId = svcItems[ci2].id; nextChantItem = svcItems[ci2]; nextChantPos = ci2; break; }
      }
      if (!nextChantId) continue;
      if (nextChantItem && nextChantItem.noAnnouncement) continue;
      // Skip if another doshi item sits between this one and the target chant (it will handle the announcement)
      var hasDoshiBetween = false;
      for (var ci3 = di + 1; ci3 < nextChantPos; ci3++) {
        if (svcItems[ci3].type === 'doshi') { hasDoshiBetween = true; break; }
      }
      if (hasDoshiBetween) continue;
      var chantStart = tmLookup[nextChantId];
      if (chantStart === undefined) continue;
      var announceChant = DATA.chants.find(function(c) { return c.id === nextChantId; });
      var cueText = (announceChant && announceChant.title) ? announceChant.title : svcItems[di].label;
      var cueTime = chantStart - 10;
      // if cueTime falls inside another chant's active window, push to that chant's endTime + 0.5
      svc.timestampMap.forEach(function(entry) {
        var eEnd = chantEndTimes[entry.chantId];
        if (eEnd !== undefined && cueTime > entry.startTime && cueTime <= eEnd) {
          cueTime = Math.max(eEnd + 0.5, chantStart - 10);
        }
      });
      ceremonyCues.push({ time: cueTime, emoji: '📖', text: cueText });
    }
    ceremonyCues.sort(function(a, b) { return a.time - b.time; });
  }

  // compute chant window (first startTime → last line cueIn) for ceremony cue splitting
  var chantWindowStart, chantWindowEnd;
  if (svc.timestampMap && svc.timestampMap.length > 0) {
    chantWindowStart = svc.timestampMap[0].startTime;
    var lastEntry = svc.timestampMap[svc.timestampMap.length - 1];
    var lastEntryLines = lastEntry.lines;
    chantWindowEnd = lastEntryLines.length > 0
      ? lastEntryLines[lastEntryLines.length - 1].cueIn
      : chantWindowStart;
  }

  // use the service's own recording if it has one
  var virtual = {
    id: svc.id,
    title: svc.title,
    audio: svc.audio || null,
    lines: lines,
    chantNames: chantNames,
    timestampMap: svc.timestampMap || null,
    ceremonyCues: ceremonyCues.length > 0 ? ceremonyCues : null,
    chantWindowStart: chantWindowStart,
    chantWindowEnd: chantWindowEnd,
    chantEndTimes: chantEndTimes
  };
  openChant(virtual);
}

// ══════════════════════════════
// OPEN CHANT
// ══════════════════════════════
function openChant(chant) {
  currentChant = chant;
  currentIndex = 0;
  hasAudio = false;
  isPlaying = false;
  listeningMode = false;
  setSpotlight(false);
  lineTranslates = {};
  window._scrollAccum = 0;
  if (tweenRaf) { cancelAnimationFrame(tweenRaf); tweenRaf = null; }
  _trackWindowEnd = 180;
  audioEl.pause();
  audioEl.src = '';

  // reset listening overlay
  var _overlay = document.getElementById('listeningOverlay');
  _overlay.classList.remove('active');
  _overlay.innerHTML = '';
  document.getElementById('chantStage').style.pointerEvents = '';

  document.getElementById('chantTitleDisplay').textContent = chant.title;
  document.getElementById('playPauseBtn').innerHTML = '&#9654;';
  document.getElementById('seekDuration').textContent = '–:––';
  document.getElementById('seekCurrentTime').textContent = '0:00';
  updateSeekBar(0);
  document.getElementById('tapHint').style.display = 'none';
  document.getElementById('audioBanner').style.display = 'none';

  document.getElementById('indexScreen').classList.add('hidden');
  document.getElementById('chantScreen').classList.remove('hidden');

  buildTrack(_trackWindowEnd);

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      cacheTranslates();
      var firstIdx = firstTextIndex();
      setClasses(firstIdx);
      applyTranslate(lineTranslates[firstIdx] || 0);

      var hasTimestampMap = chant.timestampMap && chant.timestampMap.length > 0;
      var cueInCount = chant.lines.filter(function(l) { return l.cueIn !== undefined; }).length;
      if (chant.audio && !hasTimestampMap && chant.chantNames && chant.chantNames.length > 0) {
        listeningMode = true;
        enterListeningMode(chant);
      }

      if (chant.audio) {
        tryAutoLoad(chant.audio);
      } else {
        startTapMode();
      }
    });
  });
}

function goIndex() {
  if (tweenRaf) { cancelAnimationFrame(tweenRaf); tweenRaf = null; }
  audioEl.pause();
  isPlaying = false;
  listeningMode = false;
  document.getElementById('chantStage').style.pointerEvents = '';
  var overlay = document.getElementById('listeningOverlay');
  overlay.classList.remove('active');
  overlay.innerHTML = '';
  document.getElementById('chantScreen').classList.add('hidden');
  document.getElementById('indexScreen').classList.remove('hidden');
}

// ══════════════════════════════
// AUDIO
// ══════════════════════════════
function tryAutoLoad(filename) {
  audioEl.src = filename;
  audioEl.load();

  function onReady() {
    cleanup();
    hasAudio = true;
    document.getElementById('audioBanner').style.display = 'block';
    document.getElementById('seekDuration').textContent = formatTime(audioEl.duration);

    document.getElementById('tapHint').style.display = 'none';
    audioEl.play();
    isPlaying = true;
    document.getElementById('playPauseBtn').innerHTML = '&#9646;&#9646;';
    startTween();
    setSpotlight(true);
    audioEl.addEventListener('ended', onAudioEnd);
  }

  function onErr() {
    cleanup();
    audioEl.src = '';
    startTapMode();
  }

  function cleanup() {
    audioEl.removeEventListener('canplaythrough', onReady);
    audioEl.removeEventListener('error', onErr);
  }

  audioEl.addEventListener('canplaythrough', onReady, { once: true });
  audioEl.addEventListener('error', onErr, { once: true });
}

function onAudioEnd() { endChant(); }

// ══════════════════════════════
// TAP MODE
// ══════════════════════════════
function startTapMode() {
  document.getElementById('tapHint').style.display = 'block';
}

// ══════════════════════════════
// LISTENING MODE
// ══════════════════════════════
function enterListeningMode(chant) {
  var stage = document.getElementById('chantStage');
  stage.style.opacity = '0';
  stage.style.pointerEvents = 'none';

  var names = chant.chantNames || [];
  var overlay = document.getElementById('listeningOverlay');
  overlay.innerHTML = '<div class="listening-svc-title">' + chant.title + '</div>'
    + '<div class="listening-pulse"></div>'
    + (names.length ? '<div class="listening-names">'
        + names.map(function(n) { return '<span>' + n + '</span>'; }).join('')
        + '</div>' : '');

  requestAnimationFrame(function() { overlay.classList.add('active'); });
}

// ══════════════════════════════
// BUILD TRACK DOM
// ══════════════════════════════
function buildTrack(windowEnd) {
  var track = document.getElementById('chantTrack');
  track.innerHTML = '';

  if (!currentChant.ceremonyCues || !currentChant.ceremonyCues.length) {
    // Original behavior for standalone chants: render all lines with null gaps
    var lines = currentChant.lines;
    for (var i = 0; i < lines.length; i++) {
      if (lines[i].text === null) {
        var gap = document.createElement('div');
        gap.className = 'section-gap';
        track.appendChild(gap);
      } else {
        var el = document.createElement('span');
        el.className = 'chant-line future';
        el.id = 'line-' + i;
        el.textContent = lines[i].text;
        track.appendChild(el);
      }
    }
    return;
  }

  // Unified mode: interleave ceremony cues and chant lines sorted by time
  var allItems = getAllTimedItems();
  var lastChantId = null;
  for (var j = 0; j < allItems.length; j++) {
    var item = allItems[j];
    if (windowEnd !== undefined && item.time > windowEnd) break;
    var span = document.createElement('span');
    if (typeof item.idx === 'string') {
      var ci = parseInt(item.idx.slice(2));
      var cue = currentChant.ceremonyCues[ci];
      var isTitle = cue.text && cue.text.length > 8;
      var cls = 'chant-line future is-cue';
      if (isTitle) {
        cls += ' is-title';
        var tgap = document.createElement('div');
        tgap.className = 'title-gap';
        track.appendChild(tgap);
      }
      span.className = cls;
      span.id = 'line-' + item.idx;
      span.textContent = cue.emoji + (cue.text ? ' ' + cue.text : '');
    } else {
      var lineChantId = currentChant.lines[item.idx] && currentChant.lines[item.idx].chantId;
      if (lineChantId && lineChantId !== lastChantId) {
        var gap = document.createElement('div');
        gap.className = 'large-section-gap';
        track.appendChild(gap);
        lastChantId = lineChantId;
      }
      span.className = 'chant-line future';
      span.id = 'line-' + item.idx;
      span.textContent = currentChant.lines[item.idx].text;
    }
    track.appendChild(span);
  }
}

// ══════════════════════════════
// POSITION CACHE
// ══════════════════════════════
function getTranslateForLine(idx) {
  var el = document.getElementById('line-' + idx);
  if (!el) return 0;
  return window.innerHeight / 2 - el.offsetTop - el.offsetHeight / 2;
}

function cacheTranslates() {
  var track = document.getElementById('chantTrack');
  track.style.transform = 'translateY(0px)';
  var lines = currentChant.lines;
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].text !== null) {
      lineTranslates[i] = getTranslateForLine(i);
    }
  }
  if (currentChant.ceremonyCues) {
    currentChant.ceremonyCues.forEach(function(cue, ci) {
      lineTranslates['C-' + ci] = getTranslateForLine('C-' + ci);
    });
  }
}

function applyTranslate(y) {
  document.getElementById('chantTrack').style.transform = 'translateY(' + y + 'px)';
}

// ══════════════════════════════
// LINE HELPERS
// ══════════════════════════════
function firstTextIndex() {
  var items = getAllTimedItems();
  if (items.length > 0) return items[0].idx;
  var lines = currentChant.lines;
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].text !== null) return i;
  }
  return 0;
}

function prevItemIndex(from) {
  var orderedItems = [];
  var lines = currentChant.lines;
  for (var li = 0; li < lines.length; li++) {
    if (lines[li].text !== null) orderedItems.push(li);
  }
  for (var ai = 0; ai < orderedItems.length; ai++) {
    if (orderedItems[ai] === from || orderedItems[ai] == from) {
      return ai > 0 ? orderedItems[ai - 1] : null;
    }
  }
  return null;
}

function nextTextIndex(from) {
  // build ordered list of all items (timed or DOM order)
  var allItems = getAllTimedItems();
  var orderedItems = allItems.length > 0 ? allItems : (function() {
    var items = [];
    var lines = currentChant.lines;
    for (var li = 0; li < lines.length; li++) {
      if (lines[li].text !== null) items.push({ idx: li });
    }
    return items;
  })();
  for (var ai = 0; ai < orderedItems.length; ai++) {
    if (orderedItems[ai].idx === from || orderedItems[ai].idx == from) {
      return orderedItems[ai + 1] ? orderedItems[ai + 1].idx : -1;
    }
  }
  return -1;
}

function setClasses(activeIdx) {
  currentIndex = activeIdx;

  // build an ordered list of all displayable items for position comparison
  // for timed (audio) mode use getAllTimedItems(); for tap mode fall back to line order
  var orderedItems = getAllTimedItems();
  var usingOrder = orderedItems.length > 0;

  // if no timed items (tap mode), build order from chant lines in DOM order
  if (!usingOrder) {
    var lines = currentChant.lines;
    for (var li = 0; li < lines.length; li++) {
      if (lines[li].text !== null) orderedItems.push({ idx: li });
    }
  }

  // idx === -1 is a sentinel meaning "all lines past"
  var activePos = activeIdx === -1 ? orderedItems.length : -1;
  if (activePos === -1) {
    for (var ai = 0; ai < orderedItems.length; ai++) {
      if (orderedItems[ai].idx === activeIdx || orderedItems[ai].idx == activeIdx) { activePos = ai; break; }
    }
  }
  function stateClassForDist(dist) {
    if (dist === 0)  return 'active';
    if (dist === 1)  return 'next';
    if (dist === 2)  return 'near-next';
    if (dist === -1) return 'past';
    if (dist === -2) return 'near-past';
    return 'hidden';
  }

  function applyLineClass(el, dist) {
    var state = stateClassForDist(dist);
    var extra = '';
    if (el.classList.contains('is-cue'))   extra += ' is-cue';
    if (el.classList.contains('is-title')) extra += ' is-title';
    el.className = 'chant-line ' + state + extra;
  }

  // chant line elements
  var lines2 = currentChant.lines;
  for (var i = 0; i < lines2.length; i++) {
    if (lines2[i].text === null) continue;
    var el = document.getElementById('line-' + i);
    if (!el) continue;
    var ipos = -1;
    for (var ai3 = 0; ai3 < orderedItems.length; ai3++) {
      if (orderedItems[ai3].idx == i) { ipos = ai3; break; }
    }
    applyLineClass(el, ipos - activePos);
  }

  // ceremony cue elements
  if (currentChant.ceremonyCues) {
    currentChant.ceremonyCues.forEach(function(cue, ci) {
      var cidx = 'C-' + ci;
      var el = document.getElementById('line-' + cidx);
      if (!el) return;
      var ipos = -1;
      for (var ai4 = 0; ai4 < orderedItems.length; ai4++) {
        if (orderedItems[ai4].idx == cidx) { ipos = ai4; break; }
      }
      applyLineClass(el, ipos - activePos);
    });
  }
}

// ══════════════════════════════
// TWEEN ENGINE
// ══════════════════════════════
function getAllTimedItems() {
  var out = [];
  var lines = currentChant.lines;
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].text !== null && lines[i].cueIn !== undefined) {
      out.push({ idx: i, time: lines[i].cueIn });
    }
  }
  if (currentChant.ceremonyCues) {
    currentChant.ceremonyCues.forEach(function(cue, ci) {
      out.push({ idx: 'C-' + ci, time: cue.time });
    });
  }
  out.sort(function(a, b) {
    if (a.time !== b.time) return a.time - b.time;
    var aIsChant = typeof a.idx === 'number';
    var bIsChant = typeof b.idx === 'number';
    if (aIsChant && !bIsChant) return -1;
    if (!aIsChant && bIsChant) return 1;
    return 0;
  });
  return out;
}

function rebuildTrackIfNeeded() {
  if (!currentChant.ceremonyCues) return;
  var t = audioEl.currentTime;
  if (_trackWindowEnd - t > 90) return;
  _trackWindowEnd = t + 180;
  buildTrack(_trackWindowEnd);
  cacheTranslates();
  setClasses(currentIndex);
  if (currentIndex !== -1) {
    applyTranslate(lineTranslates[currentIndex] || 0);
  }
}

function startTween() {
  if (tweenRaf) cancelAnimationFrame(tweenRaf);

  function tick() {
    var t = audioEl.currentTime;
    var dur = audioEl.duration || 68;
    updateSeekBar(t / dur);
    rebuildTrackIfNeeded();

    if (!listeningMode) {
      var allItems = getAllTimedItems();
      var curItem = allItems[0], nextItem = null;
      for (var i = 0; i < allItems.length; i++) {
        if (t >= allItems[i].time) {
          var candidate = allItems[i];
          if (!curItem || candidate.time > curItem.time ||
              (candidate.time === curItem.time && typeof candidate.idx === 'number' && typeof curItem.idx === 'string')) {
            curItem = candidate;
            nextItem = allItems[i + 1] || null;
          }
        }
      }

      if (curItem) {
        // check if we've passed the endTime of the chant this line belongs to
        if (curItem.idx >= 0 && currentChant.chantEndTimes) {
          var lineObj = currentChant.lines[curItem.idx];
          var endCid = lineObj && lineObj.chantId;
          if (endCid && t > currentChant.chantEndTimes[endCid]) {
            curItem = { idx: -1, time: curItem.time };
            nextItem = null;
          }
        }

        setClasses(curItem.idx);

        if (curItem.idx !== -1) {
          // find next real chant line (numeric idx) as scroll target, skipping any ceremony cues
          var nextReal = null;
          var passedCur = false;
          for (var ni = 0; ni < allItems.length; ni++) {
            if (passedCur && typeof allItems[ni].idx === 'number' && allItems[ni].idx !== -1) {
              nextReal = allItems[ni]; break;
            }
            if (allItems[ni] === curItem) passedCur = true;
          }
          var fromY = lineTranslates[curItem.idx] || 0;
          var toY = nextReal ? (lineTranslates[nextReal.idx] || fromY) : fromY;
          var translateY;

          if (nextReal) {
            var p = Math.max(0, Math.min(1, (t - curItem.time) / (nextReal.time - curItem.time)));
            var eased = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2, 3)/2;
            translateY = fromY + (toY - fromY) * eased;
          } else {
            translateY = fromY;
          }

          applyTranslate(translateY);
        }
      }
    }

    tweenRaf = requestAnimationFrame(tick);
  }

  tweenRaf = requestAnimationFrame(tick);
}

// ══════════════════════════════
// TAP / CLICK HANDLER
// ══════════════════════════════
// ══════════════════════════════
// SEEK BAR
// ══════════════════════════════
var seekDragging = false;

var seekDragStartX = null;

function seekToPct(pct) {
  pct = Math.max(0, Math.min(1, pct));
  if (!hasAudio || !audioEl.duration) return;
  var newTime = pct * audioEl.duration;
  audioEl.currentTime = newTime;
  updateSeekBar(pct);
  // Cancel any in-flight tween so it cannot overwrite the seek position
  if (tweenRaf) { cancelAnimationFrame(tweenRaf); tweenRaf = null; }
  if (!listeningMode) {
    var allItems = getAllTimedItems();
    var bestItem = allItems[0] || null;
    for (var i = 0; i < allItems.length; i++) {
      if (newTime >= allItems[i].time) {
        var candidate = allItems[i];
        if (!bestItem || candidate.time > bestItem.time ||
            (candidate.time === bestItem.time && typeof candidate.idx === 'number' && typeof bestItem.idx === 'string')) {
          bestItem = candidate;
        }
      }
    }
    if (bestItem) {
      // endTime dimming
      if (bestItem.idx >= 0 && currentChant.chantEndTimes) {
        var lineObj = currentChant.lines[bestItem.idx];
        var endCid = lineObj && lineObj.chantId;
        if (endCid && newTime > currentChant.chantEndTimes[endCid]) {
          bestItem = { idx: -1, time: bestItem.time };
        }
      }
      setClasses(bestItem.idx);
      if (bestItem.idx !== -1) {
        applyTranslate(lineTranslates[bestItem.idx] || 0);
      }
    }
  }
  // Restart tween loop if audio is playing
  if (hasAudio && !audioEl.paused) { startTween(); }
}

function pctFromMouse(e) {
  var wrap = document.getElementById('seekWrap');
  var rect = wrap.getBoundingClientRect();
  return (e.clientX - rect.left) / rect.width;
}

function pctFromTouch(touch) {
  var wrap = document.getElementById('seekWrap');
  var rect = wrap.getBoundingClientRect();
  return (touch.clientX - rect.left) / rect.width;
}

document.getElementById('seekWrap').addEventListener('mousedown', function(e) {
  seekDragging = true;
  seekDragStartX = e.clientX;
  document.getElementById('seekWrap').classList.add('dragging');
  seekToPct(pctFromMouse(e));
});

document.addEventListener('mousemove', function(e) {
  if (!seekDragging) return;
  if (seekDragStartX !== null && Math.abs(e.clientX - seekDragStartX) < 4) return;
  seekDragStartX = null;
  seekToPct(pctFromMouse(e));
});

document.addEventListener('mouseup', function() {
  seekDragging = false;
  seekDragStartX = null;
  document.getElementById('seekWrap').classList.remove('dragging');
}, { capture: true });

document.getElementById('seekWrap').addEventListener('touchstart', function(e) {
  seekDragging = true;
  document.getElementById('seekWrap').classList.add('dragging');
  seekToPct(pctFromTouch(e.touches[0]));
}, { passive: true });

document.addEventListener('touchmove', function(e) {
  if (!seekDragging) return;
  seekToPct(pctFromTouch(e.touches[0]));
}, { passive: true });

document.addEventListener('touchend', function() {
  seekDragging = false;
  document.getElementById('seekWrap').classList.remove('dragging');
}, { capture: true });

document.getElementById('chantScreen').addEventListener('click', function(e) {
  if (e.target.closest('.ctrl-btn') || e.target.closest('.back-btn') || e.target.closest('#seekWrap') || e.target.closest('#scrubRow')) return;
  if (hasAudio) return;
  var next = nextTextIndex(currentIndex);
  if (next === -1 || next === null) return;
  setClasses(next);
  applyTranslate(lineTranslates[next] || 0);
  // update seek bar based on position in ordered items
  var orderedForSeek = [];
  var lines = currentChant.lines;
  for (var si = 0; si < lines.length; si++) {
    if (lines[si].text !== null) orderedForSeek.push(si);
  }
  var pos = 0;
  for (var i = 0; i < orderedForSeek.length; i++) {
    if (orderedForSeek[i] === next || orderedForSeek[i] == next) { pos = i; break; }
  }
  updateSeekBar(pos / Math.max(1, orderedForSeek.length - 1));
});

document.addEventListener('keydown', function(e) {
  var cs = document.getElementById('chantScreen');
  if (cs.classList.contains('hidden')) return;
  if (e.code === 'Space' || e.code === 'ArrowRight') {
    e.preventDefault();
    if (!hasAudio) {
      var next = nextTextIndex(currentIndex);
      if (next !== -1) { setClasses(next); applyTranslate(lineTranslates[next] || 0); }
    }
  }
  if (e.code === 'ArrowLeft' && hasAudio) {
    audioEl.currentTime = Math.max(0, audioEl.currentTime - 5);
  }
});

// ══════════════════════════════
// SCROLL TO SCRUB
// ══════════════════════════════
document.getElementById('chantScreen').addEventListener('wheel', function(e) {
  e.preventDefault();
  isScrubbing = true;

  if (hasAudio) {
    audioEl.muted = true;
    var raw = e.deltaY;
    var delta = Math.sign(raw) * Math.min(Math.abs(raw) * 0.04, 3.0);
    var newTime = Math.max(0, Math.min(audioEl.duration || 68, audioEl.currentTime + delta));
    audioEl.currentTime = newTime;

    if (!isPlaying) {
      var t = newTime;
      var allItems = getAllTimedItems();
      var bestIdx = firstTextIndex();
      var bestItem2 = null;
      for (var i = 0; i < allItems.length; i++) {
        if (t >= allItems[i].time) {
          var cand = allItems[i];
          if (!bestItem2 || cand.time > bestItem2.time ||
              (cand.time === bestItem2.time && typeof cand.idx === 'number' && typeof bestItem2.idx === 'string')) {
            bestItem2 = cand;
          }
        }
      }
      if (bestItem2) bestIdx = bestItem2.idx;
      setClasses(bestIdx);
      applyTranslate(lineTranslates[bestIdx] || 0);
      updateSeekBar(t / (audioEl.duration || 68));
    }
  } else {
    if (!window._scrollAccum) window._scrollAccum = 0;
    window._scrollAccum += e.deltaY;
    var threshold = 40;
    if (window._scrollAccum > threshold) {
      window._scrollAccum = 0;
      var next = nextTextIndex(currentIndex);
      if (next !== -1) { setClasses(next); applyTranslate(lineTranslates[next] || 0); }
    } else if (window._scrollAccum < -threshold) {
      window._scrollAccum = 0;
      var prevIdx = prevItemIndex(currentIndex);
      if (prevIdx !== null) { setClasses(prevIdx); applyTranslate(lineTranslates[prevIdx] || 0); }
    }
  }

  setSpotlight(false);
  if (scrubTimer) clearTimeout(scrubTimer);
  scrubTimer = setTimeout(function() {
    isScrubbing = false;
    if (hasAudio) audioEl.muted = false;
    if (isPlaying) setSpotlight(true);
  }, 350);
}, { passive: false });

// ══════════════════════════════
// CONTROLS
// ══════════════════════════════
function setSpotlight(on) {
  document.getElementById('chantScreen').classList.toggle('spotlight', on);
}

function togglePlayPause() {
  if (!hasAudio) return;
  if (isPlaying) {
    audioEl.pause(); isPlaying = false;
    if (tweenRaf) { cancelAnimationFrame(tweenRaf); tweenRaf = null; }
    document.getElementById('playPauseBtn').innerHTML = '&#9654;';
    setSpotlight(false);
  } else {
    audioEl.play(); isPlaying = true;
    document.getElementById('playPauseBtn').innerHTML = '&#9646;&#9646;';
    startTween();
    setSpotlight(true);
  }
}

function restartChant() {
  if (tweenRaf) { cancelAnimationFrame(tweenRaf); tweenRaf = null; }
  var firstIdx = firstTextIndex();
  setClasses(firstIdx);
  applyTranslate(lineTranslates[firstIdx] || 0);
  updateSeekBar(0);
  if (hasAudio) {
    audioEl.currentTime = 0;
    audioEl.play(); isPlaying = true;
    document.getElementById('playPauseBtn').innerHTML = '&#9646;&#9646;';
    startTween();
  }
}

function endChant() {
  if (tweenRaf) { cancelAnimationFrame(tweenRaf); tweenRaf = null; }
  isPlaying = false;
  setSpotlight(false);
  document.getElementById('playPauseBtn').innerHTML = '&#9654;';
}

// ══════════════════════════════
// WAVES
// ══════════════════════════════
var canvas = document.getElementById('waveCanvas');
var ctx = canvas.getContext('2d');
var waves = [
  { amp: 0.18, freq: 0.0018, speed: 0.000004, offset: 0,   color: '#0a0e2a', yBase: 0.55, phase: 0 },
  { amp: 0.14, freq: 0.0022, speed: 0.000006, offset: 2.1, color: '#0d1540', yBase: 0.62, phase: 0 },
  { amp: 0.10, freq: 0.0028, speed: 0.000008, offset: 4.3, color: '#142060', yBase: 0.70, phase: 0 },
  { amp: 0.07, freq: 0.0035, speed: 0.000010, offset: 1.1, color: '#1a2a8a', yBase: 0.78, phase: 0 }
];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', function() { resizeCanvas(); if (currentChant) { cacheTranslates(); } });
resizeCanvas();

function drawWaves() {
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  var boostTarget = isScrubbing ? 1.15 : 1.0;
  var speedTarget = isScrubbing ? 1.6 : 1.0;
  var lerpRate = isScrubbing ? 0.10 : 0.03;
  currentBoost += (boostTarget - currentBoost) * lerpRate;
  currentSpeedBoost += (speedTarget - currentSpeedBoost) * lerpRate;

  for (var i = 0; i < waves.length; i++) {
    var w = waves[i];
    w.phase += w.speed * currentSpeedBoost;
    ctx.beginPath(); ctx.moveTo(0, H);
    for (var x = 0; x <= W; x += 3) {
      var y = w.yBase * H
        + Math.sin(x * w.freq + w.phase * 1000 + w.offset) * w.amp * currentBoost * H
        + Math.sin(x * w.freq * 1.7 + w.phase * 700 + w.offset + 1) * w.amp * currentBoost * 0.4 * H;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H); ctx.closePath();
    ctx.fillStyle = w.color; ctx.fill();
  }
  requestAnimationFrame(drawWaves);
}
drawWaves();
</script>
