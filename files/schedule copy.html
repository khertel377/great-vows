<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Great Vows · Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=IBM+Plex+Mono:wght@300;400&family=Cormorant:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --paper: #f4f0e8;
    --paper-dark: #e8e2d4;
    --muted: #9a9080;
    --very-muted: #c8bfaa;
    --accent: #2a3fcc;
    --accent-warm: #8b4a2a;
    --now-glow: rgba(42, 63, 204, 0.08);
    --gone: #c0b8a8;
    --serif: 'Cormorant', Georgia, serif;
    --mono: 'IBM Plex Mono', monospace;
    --jp: 'Noto Serif JP', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif);
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 200px 1fr;
    grid-template-rows: 100vh;
    width: 100vw; height: 100vh;
  }

  /* ── LEFT SIDEBAR: live clock + sangha ── */
  .sidebar {
    border-right: 1px solid var(--paper-dark);
    display: flex;
    flex-direction: column;
    padding: 28px 20px;
    gap: 0;
    background: var(--paper);
    position: relative;
    z-index: 2;
  }

  .sangha-name {
    font-family: var(--jp);
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .clock-block {
    flex: 0 0 auto;
  }

  .clock-time {
    font-family: var(--mono);
    font-size: 38px;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 4px;
  }

  .clock-date {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .clock-day {
    font-family: var(--serif);
    font-size: 13px;
    font-style: italic;
    color: var(--muted);
    margin-top: 2px;
  }

  .sidebar-divider {
    width: 24px;
    height: 1px;
    background: var(--paper-dark);
    margin: 24px 0;
  }

  /* current period summary in sidebar */
  .now-summary {
    flex: 1;
  }

  .now-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--very-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .now-period-name {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .now-voice {
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    color: var(--muted);
    line-height: 1.5;
  }

  .now-remaining {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 300;
    color: var(--accent);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  .sidebar-bottom {
    flex: 0 0 auto;
    margin-top: auto;
  }

  .enter-btn {
    display: block;
    width: 100%;
    padding: 10px 14px;
    background: var(--accent);
    color: #fff;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    text-align: center;
    transition: opacity 0.2s;
  }
  .enter-btn:hover { opacity: 0.85; }
  .enter-btn.disabled {
    background: var(--paper-dark);
    color: var(--very-muted);
    cursor: default;
  }
  .enter-btn.disabled:hover { opacity: 1; }

  /* ── RIGHT: SCHEDULE TRACK ── */
  .schedule-wrap {
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .schedule-header {
    padding: 28px 36px 0;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-shrink: 0;
  }

  .schedule-title {
    font-family: var(--jp);
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .schedule-subtitle {
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    color: var(--very-muted);
  }

  /* the scrolling list */
  .schedule-track {
    flex: 1;
    overflow-y: auto;
    padding: 20px 36px 60px;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  .schedule-track::-webkit-scrollbar { display: none; }

  /* ── PERIOD ROWS ── */
  .period-row {
    display: grid;
    grid-template-columns: 64px 28px 1fr;
    gap: 0 0;
    align-items: start;
    min-height: 48px;
    position: relative;
    padding: 10px 0;
    cursor: default;
    transition: background 0.3s;
    border-radius: 4px;
    margin: 0 -8px;
    padding-left: 8px;
    padding-right: 8px;
  }

  .period-row.past {
    opacity: 0.45;
  }

  .period-row.now {
    background: var(--now-glow);
    opacity: 1;
    border-left: 2px solid var(--accent);
    margin-left: -10px;
    padding-left: 18px;
  }

  .period-row.future {
    opacity: 0.78;
  }

  .period-row.between {
    opacity: 0.5;
    font-style: italic;
  }

  /* time column */
  .period-time {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 300;
    color: var(--muted);
    padding-top: 2px;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .period-row.now .period-time {
    color: var(--accent);
  }

  .period-row.past .period-time {
    color: var(--very-muted);
  }

  /* timeline line column */
  .period-line-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 4px;
    position: relative;
    height: 100%;
    min-height: 48px;
  }

  .period-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--very-muted);
    flex-shrink: 0;
    transition: background 0.3s;
    position: relative;
    z-index: 1;
  }

  .period-row.now .period-dot {
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(42, 63, 204, 0.15);
  }

  .period-row.past .period-dot {
    background: var(--paper-dark);
  }

  .period-connector {
    width: 1px;
    flex: 1;
    background: var(--paper-dark);
    margin-top: 3px;
    min-height: 20px;
  }

  /* content column */
  .period-content {
    padding-left: 14px;
    padding-top: 0;
  }

  .period-name {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 3px;
  }

  .period-row.past .period-name {
    color: var(--gone);
  }

  .period-row.now .period-name {
    font-size: 20px;
  }

  .period-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .period-dur {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 300;
    color: var(--very-muted);
    letter-spacing: 0.05em;
  }

  .period-voice {
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    color: var(--muted);
  }

  .period-tag {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    color: var(--muted);
    border: 1px solid var(--paper-dark);
  }

  .period-tag.chant {
    color: var(--accent);
    border-color: rgba(42, 63, 204, 0.25);
    background: rgba(42, 63, 204, 0.04);
  }

  .period-tag.zazen {
    color: var(--ink);
    border-color: var(--paper-dark);
  }

  .period-tag.meal {
    color: var(--accent-warm);
    border-color: rgba(139, 74, 42, 0.25);
    background: rgba(139, 74, 42, 0.04);
  }

  .period-tag.work {
    color: #5a6a40;
    border-color: rgba(90, 106, 64, 0.25);
    background: rgba(90, 106, 64, 0.04);
  }

  /* NOW indicator bar across the track */
  .now-bar {
    position: absolute;
    left: 36px; right: 36px;
    height: 1px;
    background: var(--accent);
    opacity: 0.25;
    pointer-events: none;
    z-index: 10;
    transition: top 1s linear;
  }

  /* ── PROGRESS BAR at top of period row ── */
  .period-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 1px;
    background: var(--accent);
    opacity: 0.3;
    transition: width 1s linear;
    border-radius: 1px;
  }

  /* ── fade edges of schedule track ── */
  .schedule-wrap::before,
  .schedule-wrap::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 60px;
    pointer-events: none;
    z-index: 5;
  }
  .schedule-wrap::before {
    top: 60px;
    background: linear-gradient(to bottom, var(--paper), transparent);
  }
  .schedule-wrap::after {
    bottom: 0;
    background: linear-gradient(to top, var(--paper), transparent);
  }

  /* ── PORTRAIT override (phone held upright) ── */
  @media (max-width: 600px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }
    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--paper-dark);
      flex-direction: row;
      align-items: center;
      padding: 16px 20px;
      gap: 20px;
    }
    .sangha-name { display: none; }
    .clock-time { font-size: 28px; }
    .sidebar-divider { display: none; }
    .now-summary { display: none; }
    .sidebar-bottom { margin-top: 0; }
  }

  /* ── PLACED MODE: large ambient display ── */
  body.placed-mode {
    --ink: #1a1714;
    --paper: #f0ead8;
  }
  body.placed-mode .period-row.now .period-name {
    font-size: 26px;
  }
  body.placed-mode .clock-time { font-size: 52px; }
  body.placed-mode .period-row.future { opacity: 0.5; }
  body.placed-mode .period-row.past { opacity: 0.22; }

  /* ── subtle grain overlay for warmth ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
    z-index: 100;
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sangha-name">San Francisco<br>Zen Center</div>

    <div class="clock-block">
      <div class="clock-time" id="clockTime">5:30</div>
      <div class="clock-date" id="clockDate">MON · MAR 23</div>
      <div class="clock-day" id="clockDayName">Monday</div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="now-summary">
      <div class="now-label">Now</div>
      <div class="now-period-name" id="sidebarNowName">Morning zazen</div>
      <div class="now-voice" id="sidebarNowVoice">"Just sit."</div>
      <div class="now-remaining" id="sidebarRemaining">38 min remaining</div>
    </div>

    <div class="sidebar-bottom">
      <button class="enter-btn" id="enterBtn" onclick="enterCurrentPeriod()">
        Enter service →
      </button>
    </div>
  </aside>

  <!-- SCHEDULE TRACK -->
  <main class="schedule-wrap">
    <div class="schedule-header">
      <div class="schedule-title">Monday · Horarium</div>
      <div class="schedule-subtitle">The schedule is already running</div>
    </div>
    <div class="schedule-track" id="scheduleTrack">
      <!-- rows rendered by JS -->
    </div>
  </main>

</div>

<script>
// ── SCHEDULE DATA ──────────────────────────────────────────────
// Times as [hour, minute] 24h
const SCHEDULE = [
  {
    id: 'han',
    time: [5, 15],
    end:  [5, 30],
    name: 'Han',
    type: 'bell',
    voice: '"The han calls you from sleep."',
    voiceRole: 'Ino',
    hasService: false,
  },
  {
    id: 'zazen-morning-1',
    time: [5, 30],
    end:  [6, 10],
    name: 'Zazen · first period',
    type: 'zazen',
    voice: '"Just sit."',
    voiceRole: 'Tanto',
    hasService: false,
  },
  {
    id: 'kinhin',
    time: [6, 10],
    end:  [6, 20],
    name: 'Kinhin',
    type: 'bell',
    voice: '"Walking meditation. One step, one breath."',
    voiceRole: 'Tanto',
    hasService: false,
  },
  {
    id: 'zazen-morning-2',
    time: [6, 20],
    end:  [6, 40],
    name: 'Zazen · second period',
    type: 'zazen',
    voice: '"Not fixing. Not becoming. Just this."',
    voiceRole: 'Tanto',
    hasService: false,
  },
  {
    id: 'morning-service-monday',
    time: [6, 40],
    end:  [7, 0],
    name: 'Monday Morning Service',
    type: 'chant',
    voice: '"Heart Sutra."',
    voiceRole: 'Doshi',
    hasService: true,
    serviceId: 'morning-service-monday',
  },
  {
    id: 'breakfast',
    time: [7, 0],
    end:  [8, 0],
    name: 'Breakfast',
    type: 'meal',
    voice: '"Eat moderately. Clean your bowl."',
    voiceRole: 'Tenzo',
    hasService: false,
  },
  {
    id: 'work-period',
    time: [8, 0],
    end:  [12, 0],
    name: 'Work period',
    type: 'work',
    voice: '"Whatever is in front of you."',
    voiceRole: 'Shika',
    hasService: false,
  },
  {
    id: 'noon-meal',
    time: [12, 0],
    end:  [13, 0],
    name: 'Noon meal',
    type: 'meal',
    voice: '"This food comes from the ten directions."',
    voiceRole: 'Tenzo',
    hasService: false,
  },
  {
    id: 'afternoon-work',
    time: [13, 0],
    end:  [17, 30],
    name: 'Afternoon work period',
    type: 'work',
    voice: '"Work is practice."',
    voiceRole: 'Shika',
    hasService: false,
  },
  {
    id: 'zazen-evening',
    time: [17, 30],
    end:  [18, 10],
    name: 'Evening zazen',
    type: 'zazen',
    voice: '"The same cushion. The same breath."',
    voiceRole: 'Tanto',
    hasService: false,
  },
  {
    id: 'evening-service',
    time: [18, 10],
    end:  [18, 30],
    name: 'Evening service',
    type: 'chant',
    voice: '"Three bows."',
    voiceRole: 'Doshi',
    hasService: false,
  },
  {
    id: 'dinner',
    time: [18, 30],
    end:  [19, 30],
    name: 'Dinner',
    type: 'meal',
    voice: '"Eat in good spirit."',
    voiceRole: 'Tenzo',
    hasService: false,
  },
  {
    id: 'evening-free',
    time: [19, 30],
    end:  [21, 0],
    name: 'Evening · study or rest',
    type: 'rest',
    voice: '"The day winds down."',
    voiceRole: 'Ino',
    hasService: false,
  },
  {
    id: 'lights-out',
    time: [21, 0],
    end:  [23, 59],
    name: 'Lights out',
    type: 'bell',
    voice: '"The final bell. Sleep well."',
    voiceRole: 'Ino',
    hasService: false,
  },
];

// ── UTILS ─────────────────────────────────────────────────────
function toMinutes([h, m]) { return h * 60 + m; }

function formatTime([h, m]) {
  const ampm = h < 12 ? 'AM' : 'PM';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}

function formatDuration(startMins, endMins) {
  const diff = endMins - startMins;
  if (diff >= 60) {
    const h = Math.floor(diff / 60);
    const m = diff % 60;
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  }
  return `${diff}m`;
}

function typeLabel(type) {
  const map = { zazen: 'Zazen', chant: 'Service', meal: 'Meal', work: 'Work', bell: 'Bell', rest: 'Rest' };
  return map[type] || type;
}

// ── CURRENT PERIOD ─────────────────────────────────────────────
function getNowMinutes() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
}

function getCurrentPeriod(nowMins) {
  // Exact match within a defined period
  for (let i = 0; i < SCHEDULE.length; i++) {
    const s = SCHEDULE[i];
    const start = toMinutes(s.time);
    const end = toMinutes(s.end);
    if (nowMins >= start && nowMins < end) return i;
  }
  return -1;
}

function getBetweenState(nowMins) {
  // Before the first period
  if (nowMins < toMinutes(SCHEDULE[0].time)) {
    const minsUntil = Math.ceil(toMinutes(SCHEDULE[0].time) - nowMins);
    return { type: 'before', nextIdx: 0, minsUntil };
  }
  // After the last period
  const last = SCHEDULE[SCHEDULE.length - 1];
  if (nowMins >= toMinutes(last.end)) {
    return { type: 'after' };
  }
  // Gap between two periods
  for (let i = 0; i < SCHEDULE.length - 1; i++) {
    const endCur = toMinutes(SCHEDULE[i].end);
    const startNext = toMinutes(SCHEDULE[i + 1].time);
    if (nowMins >= endCur && nowMins < startNext) {
      return { type: 'gap', prevIdx: i, nextIdx: i + 1,
               minsUntil: Math.ceil(startNext - nowMins) };
    }
  }
  return null;
}

function getStatus(index, nowPeriodIndex) {
  if (index < nowPeriodIndex) return 'past';
  if (index === nowPeriodIndex) return 'now';
  return 'future';
}

// ── RENDER ────────────────────────────────────────────────────
function renderSchedule() {
  const track = document.getElementById('scheduleTrack');
  const nowMins = getNowMinutes();
  const nowIdx = getCurrentPeriod(nowMins);
  const between = nowIdx < 0 ? getBetweenState(nowMins) : null;

  track.innerHTML = '';

  SCHEDULE.forEach((period, i) => {
    // Determine status
    let status;
    if (nowIdx >= 0) {
      status = getStatus(i, nowIdx);
    } else if (between) {
      if (between.type === 'before') {
        status = 'future';
      } else if (between.type === 'after') {
        status = 'past';
      } else {
        // gap: prevIdx is past, nextIdx and beyond are future
        status = i <= between.prevIdx ? 'past' : 'future';
      }
    } else {
      status = 'future';
    }

    const startMins = toMinutes(period.time);
    const endMins = toMinutes(period.end);
    const dur = formatDuration(startMins, endMins);

    const row = document.createElement('div');
    row.className = `period-row ${status}`;
    row.id = `period-${period.id}`;

    // progress bar for current period only
    let progressHTML = '';
    if (status === 'now') {
      const elapsed = nowMins - startMins;
      const total = endMins - startMins;
      const pct = Math.min(100, (elapsed / total) * 100);
      progressHTML = `<div class="period-progress" style="width:${pct.toFixed(1)}%"></div>`;
    }

    // Show voice quote on current, or next if between periods
    const showVoice = status === 'now' ||
      (between && between.type !== 'after' && i === between.nextIdx);

    row.innerHTML = `
      ${progressHTML}
      <div class="period-time">${formatTime(period.time)}</div>
      <div class="period-line-col">
        <div class="period-dot"></div>
        <div class="period-connector"></div>
      </div>
      <div class="period-content">
        <div class="period-name">${period.name}</div>
        <div class="period-meta">
          <span class="period-tag ${period.type}">${typeLabel(period.type)}</span>
          <span class="period-dur">${dur}</span>
          ${showVoice ? `<span class="period-voice">${period.voice}</span>` : ''}
        </div>
      </div>
    `;

    if (period.hasService && status === 'now') {
      row.style.cursor = 'pointer';
      row.onclick = () => enterCurrentPeriod();
    }

    track.appendChild(row);
  });

  // Scroll: current period to 1/3 from top; if between, scroll to next period
  const scrollTarget = nowIdx >= 0
    ? `period-${SCHEDULE[nowIdx].id}`
    : between && between.nextIdx !== undefined
      ? `period-${SCHEDULE[between.nextIdx].id}`
      : null;

  if (scrollTarget) {
    const el = document.getElementById(scrollTarget);
    if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }

  updateSidebar(nowIdx, nowMins, between);
}

// ── SIDEBAR ────────────────────────────────────────────────────
function updateSidebar(nowIdx, nowMins, between) {
  const nameEl = document.getElementById('sidebarNowName');
  const voiceEl = document.getElementById('sidebarNowVoice');
  const remainEl = document.getElementById('sidebarRemaining');
  const enterBtn = document.getElementById('enterBtn');
  const nowLabel = document.querySelector('.now-label');

  if (nowIdx >= 0) {
    // Inside a defined period
    const period = SCHEDULE[nowIdx];
    const endMins = toMinutes(period.end);
    const minsLeft = Math.ceil(endMins - nowMins);

    nowLabel.textContent = 'Now';
    nameEl.textContent = period.name;
    voiceEl.textContent = period.voice;
    remainEl.textContent = minsLeft <= 1 ? '< 1 min remaining' : `${minsLeft} min remaining`;

    if (period.hasService) {
      enterBtn.textContent = 'Enter service →';
      enterBtn.className = 'enter-btn';
    } else {
      enterBtn.textContent = `${period.voiceRole} · ${typeLabel(period.type)}`;
      enterBtn.className = 'enter-btn disabled';
    }

  } else if (between && between.type === 'after') {
    nowLabel.textContent = 'Now';
    nameEl.textContent = 'Day complete';
    voiceEl.textContent = '"Sleep well."';
    remainEl.textContent = '';
    enterBtn.textContent = 'Ino · rest';
    enterBtn.className = 'enter-btn disabled';

  } else if (between) {
    // before or gap — show upcoming period
    const next = SCHEDULE[between.nextIdx];
    nowLabel.textContent = 'Next';
    nameEl.textContent = next.name;
    voiceEl.textContent = next.voice;
    remainEl.textContent = between.minsUntil <= 1 ? 'beginning now' : `in ${between.minsUntil} min`;
    enterBtn.textContent = `${next.voiceRole} · ${formatTime(next.time)}`;
    enterBtn.className = 'enter-btn disabled';
  }
}

// ── CLOCK ──────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const ampm = h < 12 ? 'AM' : 'PM';
  const hh = h % 12 || 12;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  document.getElementById('clockTime').textContent =
    `${hh}:${String(m).padStart(2,'0')}`;
  document.getElementById('clockDate').textContent =
    `${dayNames[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}`;
  document.getElementById('clockDayName').textContent =
    days[now.getDay()];
}

// ── ENTER SERVICE ──────────────────────────────────────────────
function enterCurrentPeriod() {
  const nowMins = getNowMinutes();
  const nowIdx = getCurrentPeriod(nowMins);
  if (nowIdx < 0) return;
  const period = SCHEDULE[nowIdx];
  if (period.hasService) {
    // In production: navigate to index.html?service=morning-service-monday
    // For now, show where this would go
    const msg = document.createElement('div');
    msg.style.cssText = `
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:var(--ink); color:var(--paper);
      font-family:var(--mono); font-size:11px; letter-spacing:0.1em;
      padding:10px 20px; border-radius:2px; z-index:999;
      opacity:0; transition:opacity 0.3s;
    `;
    msg.textContent = `→ index.html?service=${period.serviceId}`;
    document.body.appendChild(msg);
    requestAnimationFrame(() => msg.style.opacity = '1');
    setTimeout(() => {
      msg.style.opacity = '0';
      setTimeout(() => msg.remove(), 300);
    }, 2500);
  }
}

// ── PLACED MODE DETECTION ──────────────────────────────────────
// Detect landscape orientation (phone on side in stand)
function checkOrientation() {
  if (window.innerWidth > window.innerHeight * 1.4) {
    document.body.classList.add('placed-mode');
  } else {
    document.body.classList.remove('placed-mode');
  }
}

window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', checkOrientation);
checkOrientation();

// ── TICK ───────────────────────────────────────────────────────
let lastRenderedMinute = -1;

function tick() {
  updateClock();
  const nowMins = getNowMinutes();
  const currentMinute = Math.floor(nowMins);
  const nowIdx = getCurrentPeriod(nowMins);
  const between = nowIdx < 0 ? getBetweenState(nowMins) : null;

  // Re-render schedule when minute changes (period transitions)
  if (currentMinute !== lastRenderedMinute) {
    renderSchedule();
    lastRenderedMinute = currentMinute;
  } else {
    // Just update sidebar remaining time each second
    updateSidebar(nowIdx, nowMins, between);

    // Update progress bar of current period
    if (nowIdx >= 0) {
      const period = SCHEDULE[nowIdx];
      const startMins = toMinutes(period.time);
      const endMins = toMinutes(period.end);
      const elapsed = nowMins - startMins;
      const total = endMins - startMins;
      const pct = Math.min(100, (elapsed / total) * 100);
      const progressBar = document.querySelector(`#period-${period.id} .period-progress`);
      if (progressBar) progressBar.style.width = `${pct.toFixed(2)}%`;
    }
  }
}

// ── INIT ───────────────────────────────────────────────────────
updateClock();
renderSchedule();
setInterval(tick, 1000);
</script>
