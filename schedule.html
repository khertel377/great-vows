<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Schedule — Great Vows</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Cormorant:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ══════════════════════════════
   TYPE SYSTEM — Great Vows Schedule
   Five roles. Two families. No other combinations permitted.

   Headline  — Cormorant, 400, 54px (now-row + clock) / 20px (other rows)
   Meta      — IBM Plex Mono, 400, 12px, opacity 0.45, letter-spacing 0.05em, uppercase for AM/PM
   Label     — Cormorant italic, 400, 15px, opacity 0.38
   Value     — IBM Plex Mono, 400, 12px, opacity 0.5
   Inst.     — IBM Plex Mono, 400, 10px, letter-spacing 0.15em, uppercase, opacity 0.3
══════════════════════════════ */

:root {
  --ink: #1a1814;
  --paper: #f4f0e8;
  --seal: #B03A2E;
  --op-past: 0.32;
  --op-future: 0.65;
  --mono: 'IBM Plex Mono', monospace;
  --serif: 'Cormorant', serif;
  --sab: env(safe-area-inset-bottom, 0px);
}

html {
  background: var(--paper);
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--mono);
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(26,24,20,0.14) transparent;
  transition: background 4s ease;
}

body.after-schedule {
  background: #f0ebe0; /* slightly warmer at end of day */
}

body::-webkit-scrollbar { width: 3px; }
body::-webkit-scrollbar-track { background: transparent; }
body::-webkit-scrollbar-thumb { background: rgba(26,24,20,0.14); }

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  opacity: 0.3;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── APP SHELL ── */
#layout {
  display: flex;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* ══════════════════════════════
   SIDEBAR — sticky panel, always visible in viewport
══════════════════════════════ */
#sidebar {
  width: 280px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  align-self: flex-start;
  overflow: visible;
}

.sidebar-header {
  position: absolute;
  top: 20px;
  left: 20px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink);
  opacity: 0.3;
  line-height: 1.6;
}

/* Wrapper for clock + meta + next — translateY drives scroll-sync alignment */
#sidebar-content {
  position: absolute;
  left: 20px;
  right: 20px;
  top: 35%;
  will-change: transform;
}

.sidebar-now {
  padding-bottom: 12px; /* descender clearance — Cormorant 7 drops below baseline */
}

.clock-display {
  display: flex;
  align-items: baseline;
  letter-spacing: -0.01em;
  overflow: visible;
}

.sidebar-next {
  position: absolute;
  left: 20px;
  right: 20px;
  display: flex;
  align-items: baseline;
  gap: 10px;
  white-space: nowrap;
}

.next-label {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  font-weight: 400;
  color: var(--ink);
  opacity: 0.38;
  line-height: 1;
}

.next-value {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.03em;
  color: var(--ink);
  opacity: 0.5;
  line-height: 1;
}

.clock-hm,
.clock-sep,
.clock-sec {
  font-family: var(--serif);
  font-size: 54px;
  font-weight: 400;
  line-height: 1;
  color: var(--ink);
  opacity: 1;
}

.clock-sep {
  opacity: 0.25;
  transition: opacity 0.45s ease-in-out;
}

.clock-sep.pulse { opacity: 0.85; }

.enter-btn {
  position: absolute;
  bottom: 24px;
  left: 20px;
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--ink);
  text-decoration: none;
  border: 1px solid rgba(26,24,20,0.28);
  padding: 7px 11px;
  opacity: 0.65;
  transition: opacity 0.2s;
}

.enter-btn:hover { opacity: 1; }
.enter-btn.hidden { display: none; }

/* ── SEPARATOR ── */
#vline {
  width: 1px;
  background: rgba(26,24,20,0.12);
  flex-shrink: 0;
}

/* ══════════════════════════════
   SCHEDULE TRACK
══════════════════════════════ */
#track {
  flex: 1;
  padding: 20px 32px 80px 0;
}

/* ── PERIOD ROWS ── */
.period-row {
  padding: 10px 16px 10px 24px;
  border-left: 3px solid transparent;
  transition: opacity 0.3s ease;
  cursor: default;
  user-select: none;
  position: relative;
}

.period-row.past   { opacity: var(--op-past); }
.period-row.future { opacity: var(--op-future); }
.period-row.now    { opacity: 1; }

/* Imminent: next period when we're in a gap — slightly brighter */
.period-row.imminent { opacity: 0.82; }

/* After-schedule: very dim — day is done */
body.after-schedule .period-row.past { opacity: 0.18; }

/* Closing rule — end of day */
#closing-rule {
  height: 0.5px;
  background: var(--ink);
  opacity: 0.2;
  margin: 0 0 0 24px;
}

/* Hover surfacing */
.period-row[data-hover="active"]   { opacity: 0.88; }
.period-row[data-hover="neighbor"] { opacity: 0.55; }

/* Scroll surfacing */
#track.scrolling .period-row.past   { opacity: 0.68; }
#track.scrolling .period-row.future { opacity: 0.68; }

/* ── ROW CONTENT ── */
.period-name {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.2;
  padding-bottom: 8px;
  overflow: visible;
}

/* Now row: period name matches clock — with transition so it grows in smoothly */
.period-row.now .period-name {
  font-size: 54px;
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.01em;
  transition: font-size 0.6s ease, opacity 0.6s ease;
}

/* Period entering: start small, grow into the now size */
.period-row.now.period-enter .period-name {
  animation: periodNameEnter 0.6s ease forwards;
}
@keyframes periodNameEnter {
  from { font-size: 20px; opacity: 0.5; letter-spacing: 0em; }
  to   { font-size: 54px; opacity: 1;   letter-spacing: -0.01em; }
}

.period-row-meta {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 400;
  color: var(--ink);
  opacity: 0.45;
  letter-spacing: 0.05em;
  line-height: 1;
  white-space: nowrap;
  transition: opacity 0.3s ease;
}

.period-row:not(.now) .period-row-meta { opacity: 0; }

.period-row:not(.now):hover .period-row-meta,
.period-row:not(.now)[data-hover="active"] .period-row-meta,
.period-row:not(.now).meta-visible .period-row-meta { opacity: 0.45; }

.period-row.now .period-row-meta {
  font-size: 12px;
  opacity: 0.55;
}

/* ── AUDIO DOT ── */
.audio-dot {
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ink);
  opacity: 0.3;
  margin-right: 6px;
  vertical-align: middle;
  flex-shrink: 0;
}
.period-row.now .audio-dot { opacity: 0.5; }

/* ══════════════════════════════
   CONNECTOR OVERLAY
   Cross slides smoothly between positions on period transitions
══════════════════════════════ */
#now-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}

#now-bar {
  position: absolute;
  width: 3px;
  background: var(--seal);
  display: none;
}

#now-mark {
  position: absolute;
  background: var(--seal);
  display: none;
}

/* Clock meta — AM/PM: position:absolute child of #sidebar, JS sets top */
.clock-meta {
  position: absolute;
  left: 20px;
  right: 20px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
  color: var(--ink);
  opacity: 0.45;
  line-height: 1;
}

/* ══════════════════════════════
   QUIET MODE — dark inversion during 10pm–5:10am
══════════════════════════════ */
body.quiet-mode {
  background: #1a1814;
}
body.quiet-mode .period-name,
body.quiet-mode .clock-display,
body.quiet-mode #mobile-clock {
  color: rgba(244,240,232,0.9);
}
body.quiet-mode .period-row-meta,
body.quiet-mode .clock-meta,
body.quiet-mode #sidebar-next {
  color: rgba(244,240,232,0.35);
}
body.quiet-mode #now-bar,
body.quiet-mode #now-mark,
body.quiet-mode #now-mark-2 {
  background: rgba(244,240,232,0.7);
}
body.quiet-mode #vline {
  background: rgba(244,240,232,0.12);
}
body.quiet-mode .audio-dot { background: rgba(244,240,232,0.9); }
body.quiet-mode .sidebar-header {
  color: rgba(244,240,232,0.9);
}
/* clock children have explicit color:var(--ink) — must override directly */
body.quiet-mode .clock-hm,
body.quiet-mode .clock-sec {
  color: rgba(244,240,232,0.9);
}
body.quiet-mode .clock-sep {
  color: rgba(244,240,232,0.9);
  opacity: 0.45;
}
body.quiet-mode .clock-sep.pulse { opacity: 0.85; }

/* ══════════════════════════════
   PLACED MODE (landscape ≥ 1.4:1)
══════════════════════════════ */
body.placed {
  --op-past: 0.22;
  --op-future: 0.55;
}

body.placed .clock-hm,
body.placed .clock-sep,
body.placed .clock-sec  { font-size: 52px; }
body.placed .period-row.now .period-name { font-size: 52px; }
</style>
</head>
<body>

<div id="layout">

  <aside id="sidebar">
    <div class="sidebar-header">San Francisco<br>Zen Center</div>

    <div id="sidebar-content">
      <div class="sidebar-now" id="sidebarNow">
        <div class="clock-display">
          <span class="clock-hm" id="clock-hm">--:--</span><span class="clock-sep colon">:</span><span class="clock-sec" id="clock-sec">--</span>
        </div>
      </div>
    </div>

    <div class="clock-meta" id="clock-ampm"></div>

    <div class="sidebar-next" id="sidebar-next">
      <span class="next-label" id="next-label">Next</span><span class="next-value baseline-probe" id="next-value"></span>
    </div>

    <a class="enter-btn hidden" id="enterBtn" href="#">Enter service →</a>

  </aside>

  <div id="vline"></div>

  <main id="track"></main>

</div>


<!-- Fixed viewport overlay — bar and mark share this coordinate space, same separatorX -->
<div id="now-overlay">
  <div id="now-bar"></div>
  <div id="now-mark"></div>
</div>

<script>
// ══════════════════════════════
// DATA
// ══════════════════════════════
const SCHEDULE = [
  { id: 'quiet-morning',  time: [0,0],   end: [4,30],  name: 'Quiet',                 type: 'quiet', hasService: false },
  { id: 'wake-up-bell',   time: [4,30],  end: [4,45],  name: 'Wake-up Bell',          type: 'bell',  hasService: false, audio: 'audio/SFZC/koten-and-shinrei-wakeup.mp3' },
  { id: 'han',            time: [4,45],  end: [5,0],   name: 'Han',                   type: 'bell',  hasService: false, audio: 'audio/SFZC/temple_sounds-the_han.mp3' },
  { id: 'zazen-morning',  time: [5,0],   end: [6,30],  name: 'Zazen',                 type: 'zazen', hasService: false },
  { id: 'morning-service',time: [6,30],  end: [7,0],   name: 'Morning Service',       type: 'chant', hasService: true  },
  { id: 'soji',           time: [7,0],   end: [7,20],  name: 'Soji',                  type: 'work',  hasService: false },
  { id: 'breakfast',      time: [7,20],  end: [8,10],  name: 'Breakfast',             type: 'meal',  hasService: false },
  { id: 'study-hall',     time: [8,10],  end: [9,10],  name: 'Study Hall',            type: 'study', hasService: false },
  { id: 'work-morning',   time: [9,10],  end: [12,15], name: 'Work Period',           type: 'work',  hasService: false },
  { id: 'midday-service', time: [12,15], end: [12,30], name: 'Mid-day Service',       type: 'chant', hasService: false },
  { id: 'lunch',          time: [12,30], end: [13,15], name: 'Lunch',                 type: 'meal',  hasService: false },
  { id: 'work-afternoon', time: [13,15], end: [15,0],  name: 'Afternoon Work',        type: 'work',  hasService: false },
  { id: 'personal',       time: [15,0],  end: [17,15], name: 'Bath / Rest / Personal',type: 'rest',  hasService: false },
  { id: 'zazen-evening',  time: [17,15], end: [17,50], name: 'Zazen',                 type: 'zazen', hasService: false },
  { id: 'evening-service',time: [17,50], end: [18,0],  name: 'Evening Service',       type: 'chant', hasService: true  },
  { id: 'dinner',         time: [18,0],  end: [19,30], name: 'Dinner',                type: 'meal',  hasService: false },
  { id: 'zazen-night',    time: [19,30], end: [20,50], name: 'Zazen',                 type: 'zazen', hasService: false },
  { id: 'three-refuges',  time: [20,50], end: [21,0],  name: 'Three Refuges',         type: 'chant', hasService: false },
  { id: 'firewatch',      time: [21,0],  end: [22,0],  name: 'Firewatch',             type: 'quiet', hasService: false },
  { id: 'quiet-night',    time: [22,0],  end: [24,0],  name: 'Quiet',                 type: 'quiet', hasService: false },
];

// ══════════════════════════════
// STATE LOGIC
// Returns one of: 'before', 'during', 'between', 'after'
// 'between' includes prev period so connector can span the gap
// ══════════════════════════════
function getScheduleState(now) {
  const totalMins = now.getHours() * 60 + now.getMinutes();
  const firstStart = SCHEDULE[0].time[0] * 60 + SCHEDULE[0].time[1];

  // Before first period of the day
  if (totalMins < firstStart) {
    return { state: 'before', next: SCHEDULE[0], minsUntil: firstStart - totalMins };
  }

  for (let i = 0; i < SCHEDULE.length; i++) {
    const p     = SCHEDULE[i];
    const start = p.time[0] * 60 + p.time[1];
    const end   = p.end[0]  * 60 + p.end[1];

    // During this period
    if (totalMins >= start && totalMins < end) {
      const duration = (end - start) * 60;
      const elapsed  = (totalMins - start) * 60 + now.getSeconds();
      return { state: 'during', period: p, elapsed, duration };
    }

    // Gap after this period and before the next
    if (i < SCHEDULE.length - 1) {
      const nextStart = SCHEDULE[i + 1].time[0] * 60 + SCHEDULE[i + 1].time[1];
      if (totalMins >= end && totalMins < nextStart) {
        return { state: 'between', prev: p, next: SCHEDULE[i + 1], minsUntil: nextStart - totalMins };
      }
    }
  }

  // After last period
  return { state: 'after', next: SCHEDULE[0] };
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function fmtTime12(hm) {
  const h = hm[0] % 12 || 12;
  const ampm = hm[0] >= 12 ? 'PM' : 'AM';
  return h + ':' + pad2(hm[1]) + '\u202f' + ampm;
}

function formatDuration(mins) {
  if (mins < 60) return mins + ' min';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? h + 'h ' + m + 'm' : h + 'h';
}

function periodDurMins(p) {
  return (p.end[0] * 60 + p.end[1]) - (p.time[0] * 60 + p.time[1]);
}

function rowHeight(mins) {
  return Math.round(28 + 6 * Math.sqrt(mins));
}

// Next value for 'during' state — time until next period starts
function formatNextValue(currentPeriod, now) {
  const currentIdx    = SCHEDULE.indexOf(currentPeriod);
  const next          = SCHEDULE[currentIdx + 1];
  if (!next) return 'last';
  const nextStartMins = next.time[0] * 60 + next.time[1];
  const nowMins       = now.getHours() * 60 + now.getMinutes();
  const minsUntil     = nextStartMins - nowMins;
  if (minsUntil <= 0) return 'soon';
  return formatDuration(minsUntil);
}

// Duration from now until Han tomorrow
function formatUntilTomorrow(now) {
  const han     = SCHEDULE.find(p => p.id === 'han');
  const hanMins = han ? han.time[0] * 60 + han.time[1] : 310;
  const nowMins = now.getHours() * 60 + now.getMinutes();
  return 'in ' + formatDuration((24 * 60 - nowMins) + hanMins);
}

// ══════════════════════════════
// CLOCK
// ══════════════════════════════
function updateClock(now) {
  const h = now.getHours() % 12 || 12;
  document.getElementById('clock-hm').textContent   = h + ':' + pad2(now.getMinutes());
  document.getElementById('clock-sec').textContent  = pad2(now.getSeconds());
  document.getElementById('clock-ampm').textContent = now.getHours() >= 12 ? 'PM' : 'AM';

  document.querySelectorAll('.colon').forEach(c => {
    c.classList.add('pulse');
    setTimeout(() => c.classList.remove('pulse'), 900);
  });
}

// ══════════════════════════════
// SIDEBAR TEXT
// ══════════════════════════════
function updateSidebar(state, now) {
  const nextLabelEl = document.getElementById('next-label');
  const nextValueEl = document.getElementById('next-value');
  const enterBtn    = document.getElementById('enterBtn');

  if (state.state === 'during') {
    nextLabelEl.textContent = 'Next';
    nextValueEl.textContent = formatNextValue(state.period, now);
    if (state.period.hasService && (typeof AudioEngine === 'undefined' || AudioEngine.isServiceAvailable(state.period.serviceId))) {
      enterBtn.classList.remove('hidden');
      enterBtn.href = 'index.html?service=' + state.period.serviceId;
    } else {
      enterBtn.classList.add('hidden');
    }
  } else if (state.state === 'between') {
    nextLabelEl.textContent = 'Next';
    nextValueEl.textContent = 'in ' + formatDuration(state.minsUntil);
    enterBtn.classList.add('hidden');
  } else if (state.state === 'before') {
    nextLabelEl.textContent = 'Next';
    nextValueEl.textContent = formatDuration(state.minsUntil);
    enterBtn.classList.add('hidden');
  } else {
    // after
    nextLabelEl.textContent = 'Tomorrow';
    nextValueEl.textContent = formatUntilTomorrow(now);
    enterBtn.classList.add('hidden');
  }
}

// ══════════════════════════════
// SCROLL TO NOW
// ══════════════════════════════
function scrollToNow(behavior) {
  const target = document.querySelector('.period-row.now') || document.querySelector('.period-row.future');
  if (!target) return;
  const rowTop       = target.getBoundingClientRect().top + window.scrollY;
  const scrollTarget = rowTop - window.innerHeight / 2 + target.offsetHeight / 2;
  window.scrollTo({ top: Math.max(0, scrollTarget), behavior: behavior || 'instant' });
}

// ══════════════════════════════
// TRACK BUILD
// ══════════════════════════════
let _lastNowId      = undefined;
let _trackEverBuilt = false;

function buildTrack(state) {
  const track     = document.getElementById('track');
  const nowId     = state.state === 'during' ? state.period.id : null;
  const newPeriod = nowId !== _lastNowId;
  const now       = new Date();
  const totalMins = now.getHours() * 60 + now.getMinutes();
  const nowIdx    = nowId ? SCHEDULE.findIndex(p => p.id === nowId) : -1;

  // Body state class for after-schedule styling
  document.body.classList.toggle('after-schedule', state.state === 'after');

  track.innerHTML = '';

  SCHEDULE.forEach((p, i) => {
    const endM    = p.end[0] * 60 + p.end[1];
    const durMins = periodDurMins(p);

    // Row classification
    let rowClass;
    if (state.state === 'before') {
      rowClass = 'future';
    } else if (state.state === 'after') {
      rowClass = 'past';
    } else if (nowId === p.id) {
      rowClass = 'now';
    } else if (totalMins >= endM) {
      rowClass = 'past';
    } else {
      rowClass = 'future';
    }

    const isNextPeriod = nowIdx !== -1 && i === nowIdx + 1;
    const isImminent   = state.state === 'between' && p.id === state.next.id;

    const row = document.createElement('div');
    row.dataset.periodId = p.id; // enables [data-period-id] selector
    row.dataset.idx      = i;
    row.style.minHeight  = rowHeight(durMins) + 'px';

    let classes = 'period-row ' + rowClass;
    if (isNextPeriod) classes += ' next-period';
    if (isImminent)   classes += ' imminent';
    row.className = classes;

    // Period name grows in on live period change
    if (rowClass === 'now' && newPeriod && _trackEverBuilt) {
      row.classList.add('period-enter');
      setTimeout(() => row.classList.remove('period-enter'), 700);
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'period-name';

    const AUDIO_PERIODS = ['wake-up-bell', 'han', 'morning-service', 'evening-service'];
    if (AUDIO_PERIODS.includes(p.id)) {
      const dot = document.createElement('span');
      dot.className = 'audio-dot';
      nameEl.appendChild(dot);
    }

    if (isNextPeriod) {
      const probe = document.createElement('span');
      probe.className = 'baseline-probe';
      probe.textContent = p.name;
      nameEl.appendChild(probe);
    } else {
      nameEl.appendChild(document.createTextNode(p.name));
    }

    const metaEl = document.createElement('div');
    metaEl.className   = 'period-row-meta';
    metaEl.textContent = fmtTime12(p.time) + ' · ' + formatDuration(durMins);

    row.appendChild(nameEl);
    row.appendChild(metaEl);
    track.appendChild(row);
  });

  // Closing rule at end of day
  if (state.state === 'after') {
    const rule = document.createElement('div');
    rule.id = 'closing-rule';
    track.appendChild(rule);
  }

  _attachHoverHandlers();

  if (!_trackEverBuilt) {
    setTimeout(() => {
      document.querySelector('.period-row.now')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 40);
  } else if (newPeriod) {
    setTimeout(() => scrollToNow('smooth'), 40);
  }

  _lastNowId      = nowId;
  _trackEverBuilt = true;
}

// ══════════════════════════════
// HOVER SURFACING + MOBILE META REVEAL
// ══════════════════════════════

// Track the one non-now row currently showing its meta on mobile
let _metaVisibleRow  = null;
let _metaDismissTimer = null;
let _metaObserver    = null;

function _clearMeta(row) {
  if (row) row.classList.remove('meta-visible');
  if (_metaDismissTimer) { clearTimeout(_metaDismissTimer); _metaDismissTimer = null; }
  if (_metaVisibleRow === row) _metaVisibleRow = null;
}

function _showMeta(row) {
  if (row.classList.contains('now')) return; // now-row always handled by CSS
  if (_metaVisibleRow && _metaVisibleRow !== row) _clearMeta(_metaVisibleRow);
  row.classList.add('meta-visible');
  _metaVisibleRow = row;
  if (_metaDismissTimer) clearTimeout(_metaDismissTimer);
  _metaDismissTimer = setTimeout(() => _clearMeta(row), 2000);
}

function _attachHoverHandlers() {
  const rows = Array.from(document.querySelectorAll('.period-row'));

  // ── Desktop hover surfacing ──
  rows.forEach((row, i) => {
    row.addEventListener('mouseenter', () => {
      rows.forEach(r => r.removeAttribute('data-hover'));
      row.dataset.hover = 'active';
      if (rows[i - 1]) rows[i - 1].dataset.hover = 'neighbor';
      if (rows[i + 1]) rows[i + 1].dataset.hover = 'neighbor';
    });
  });

  // ── Mobile only: tap + scroll-center meta reveal ──
  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (!isTouchDevice) return;

  // Tap: toggle meta on the tapped row; clear others
  rows.forEach(row => {
    row.addEventListener('click', (e) => {
      if (row.classList.contains('now')) return;
      if (row.classList.contains('meta-visible')) {
        _clearMeta(row);
      } else {
        _showMeta(row);
      }
      e.stopPropagation();
    });
  });

  // Scroll-center observer: fires when a row crosses the center ±20% band
  if (_metaObserver) _metaObserver.disconnect();
  const centerBand = Math.round(window.innerHeight * 0.2);
  _metaObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const row = entry.target;
      if (row.classList.contains('now')) return;
      _showMeta(row);
    });
  }, {
    rootMargin: `-${Math.round(window.innerHeight * 0.5 - centerBand)}px 0px -${Math.round(window.innerHeight * 0.5 - centerBand)}px 0px`,
    threshold: 0,
  });

  rows.forEach(row => {
    if (!row.classList.contains('now')) _metaObserver.observe(row);
  });
}

document.getElementById('track').addEventListener('mouseleave', () => {
  document.querySelectorAll('.period-row').forEach(r => r.removeAttribute('data-hover'));
});

// ══════════════════════════════
// SCROLL SURFACING + CONNECTOR
// ══════════════════════════════
let _currentState = null; // kept for scroll/resize connector calls
let _scrollTimer  = null;
let _rafPending   = false;

window.addEventListener('scroll', () => {
  document.getElementById('track').classList.add('scrolling');
  if (_scrollTimer) clearTimeout(_scrollTimer);
  _scrollTimer = setTimeout(() => {
    document.getElementById('track').classList.remove('scrolling');
  }, 1800);

  if (_currentState && !_rafPending) {
    _rafPending = true;
    requestAnimationFrame(() => {
      _rafPending = false;
      _refreshConnGeo();
      positionConnector(_currentState, _connGeo);
      alignSidebar(_currentState);
    });
  }
}, { passive: true });

// ══════════════════════════════
// CONNECTOR HELPERS
// ══════════════════════════════
function periodStartSecs(p) { return p.time[0] * 3600 + p.time[1] * 60; }
function periodEndSecs(p)   { return p.end[0]  * 3600 + p.end[1]  * 60; } // [24,0] → 86400
function nowSecs() {
  const d = new Date();
  return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
}

// ══════════════════════════════
// CONNECTOR — viewport-coords fixed overlay
//
// Normal periods: mark drifts continuously from row top → row bottom
//   proportional to elapsed / duration. Bar spans full row height.
//
// Quiet periods (treadmill): bar is full viewport at 0.06 opacity.
//   Mark drifts from viewport top → bottom over the full period duration.
//   At quiet-night progress > 0.85, a second mark (#now-mark-2) descends
//   from above the viewport so it reaches Y=0 exactly at midnight —
//   seamless handoff to quiet-morning's treadmill.
//
// Between / before / after: unchanged from prior behavior.
// ══════════════════════════════

// ── CONNECTOR GEOMETRY CACHE ──
// All getBoundingClientRect() reads happen here — never inside the rAF draw loop.
// Updated on: track rebuild (minute change), scroll, resize. NOT on the 1s tick.
// Prevents Safari 18+ layout thrash: DOM writes in tick() then layout reads in
// positionConnector() forced synchronous reflows that caused jitter on new devices.
let _connGeo = null;

function _refreshConnGeo() {
  const state   = _currentState;
  const sidebar = document.getElementById('sidebar');
  if (!state || !sidebar) { _connGeo = null; return; }

  const sepX = sidebar.getBoundingClientRect().right;
  let rowEl = null, morningEl = null;

  if (state.state === 'during') {
    rowEl = document.querySelector('.period-row.now');
    if (state.period && state.period.id === 'quiet-night') {
      morningEl = document.querySelector('[data-period-id="quiet-morning"]');
    }
  } else if (state.state === 'between') {
    rowEl = document.querySelector(`[data-period-id="${state.prev.id}"]`);
  } else if (state.state === 'before') {
    rowEl = document.querySelector('.period-row');
  }

  _connGeo = {
    sepX,
    rowRect:     rowEl     ? rowEl.getBoundingClientRect()     : null,
    morningRect: morningEl ? morningEl.getBoundingClientRect() : null,
  };
}

function positionConnector(state, geo) {
  const barEl   = document.getElementById('now-bar');
  const markEl  = document.getElementById('now-mark');
  const sidebar = document.getElementById('sidebar');
  const sepX    = geo ? geo.sepX : sidebar.getBoundingClientRect().right;

  const BAR_W  = 3;
  const MARK_W = 18, MARK_H = 3;

  function setBar(top, height, opacity) {
    barEl.style.left         = (sepX - BAR_W / 2) + 'px';
    barEl.style.top          = top + 'px';
    barEl.style.height       = height + 'px';
    barEl.style.opacity      = opacity != null ? String(opacity) : '';
    barEl.style.borderRadius = '0';
    barEl.style.display      = 'block';
  }

  function setMark(el, y) {
    el.style.left         = (sepX - MARK_W / 2) + 'px';
    el.style.top          = (y - MARK_H / 2) + 'px';
    el.style.width        = MARK_W + 'px';
    el.style.height       = MARK_H + 'px';
    el.style.borderRadius = '0';
    el.style.display      = 'block';
  }

  function removeSecondMark() {
    const m2 = document.getElementById('now-mark-2');
    if (m2) m2.remove();
  }

  if (state.state === 'during' && state.period.type === 'quiet') {
    // ── QUIET MODE — row-relative geometry ───────────────
    const period    = state.period;
    const rowRect = geo ? geo.rowRect : (() => { const r = document.querySelector('.period-row.now'); return r ? r.getBoundingClientRect() : null; })();
    if (!rowRect) { barEl.style.display = 'none'; markEl.style.display = 'none'; return; }

    const elapsed  = nowSecs() - periodStartSecs(period);
    const duration = periodEndSecs(period) - periodStartSecs(period);
    const progress = Math.min(elapsed / duration, 1);
    const markY    = rowRect.top + progress * rowRect.height;

    // Bar: anchored to row edge, extending to viewport boundary
    if (period.id === 'quiet-night') {
      const sab = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sab')) || 0;
      setBar(rowRect.top, window.innerHeight - sab - rowRect.top, null);
    } else {
      // quiet-morning: row is at top of track, bar from viewport top to row bottom
      setBar(0, rowRect.bottom, null);
    }
    setMark(markEl, markY);

    // Midnight handoff: second mark tracks where quiet-morning's mark will be
    if (period.id === 'quiet-night' && progress > 0.85) {
      const MORNING_DUR   = 5 * 3600 + 10 * 60; // 18600s
      const mRect = (geo && geo.morningRect) ? geo.morningRect : (() => { const r = document.querySelector('[data-period-id="quiet-morning"]'); return r ? r.getBoundingClientRect() : { top: 0, height: rowRect.height }; })();
      const secondElapsed = (progress - 1.0) * duration; // negative seconds from midnight
      const secondMarkY   = mRect.top + (secondElapsed / MORNING_DUR) * mRect.height;

      let mark2 = document.getElementById('now-mark-2');
      if (!mark2) {
        mark2 = document.createElement('div');
        mark2.id               = 'now-mark-2';
        mark2.style.position   = 'absolute';
        mark2.style.background = 'var(--seal)';
        mark2.style.pointerEvents = 'none';
        document.getElementById('now-overlay').appendChild(mark2);
      }
      setMark(mark2, secondMarkY);
    } else {
      removeSecondMark();
    }

  } else if (state.state === 'during') {
    // ── NORMAL CONTINUOUS MARK ───────────────────────────
    removeSecondMark();
    const rowRect = geo ? geo.rowRect : (() => { const r = document.querySelector('.period-row.now'); return r ? r.getBoundingClientRect() : null; })();
    if (!rowRect) { barEl.style.display = 'none'; markEl.style.display = 'none'; return; }
    const period   = state.period;
    const elapsed  = nowSecs() - periodStartSecs(period);
    const duration = periodEndSecs(period) - periodStartSecs(period);
    const progress = Math.min(elapsed / duration, 1);
    const markY    = rowRect.top + progress * rowRect.height;

    setBar(rowRect.top, rowRect.height, null);
    setMark(markEl, markY);

  } else if (state.state === 'between') {
    // Gap between periods: clamp cross to bottom of the period that just ended
    // (progress = 1.0), bar spans its full row. Cross stays put until next period begins.
    removeSecondMark();
    const rowRect = geo ? geo.rowRect : (() => { const r = document.querySelector(`[data-period-id="${state.prev.id}"]`); return r ? r.getBoundingClientRect() : null; })();
    if (!rowRect) { barEl.style.display = 'none'; markEl.style.display = 'none'; return; }
    setBar(rowRect.top, rowRect.height, null);
    setMark(markEl, rowRect.bottom);

  } else if (state.state === 'before') {
    removeSecondMark();
    const firstRect = geo ? geo.rowRect : (() => { const r = document.querySelector('.period-row'); return r ? r.getBoundingClientRect() : null; })();
    if (!firstRect) { barEl.style.display = 'none'; markEl.style.display = 'none'; return; }

    barEl.style.display  = 'none';
    barEl.style.opacity  = '';
    markEl.style.width        = '6px';
    markEl.style.height       = '6px';
    markEl.style.borderRadius = '50%';
    markEl.style.top          = (firstRect.top - 10) + 'px';
    markEl.style.left         = (sepX - 3) + 'px';
    markEl.style.display      = 'block';

  } else {
    removeSecondMark();
    barEl.style.display  = 'none';
    markEl.style.display = 'none';
    barEl.style.opacity  = '';
  }
}

// ══════════════════════════════
// SIDEBAR ALIGNMENT
// clockNaturalTop: the clock's viewport-top with transform zeroed — measured
// once on load (and re-baselined on resize). Delta is always computed against
// this fixed reference, so repeated calls don't compound on each other.
// ══════════════════════════════
// clockNaturalTop:    clock-display's viewport top with transform zeroed
// clockNaturalBottom: sidebarNow block's viewport bottom (clock + descender padding)
// Both measured once on load; re-baselined on resize.
// clock-meta and sidebar-next are position:absolute children of #sidebar (sidebarTop=0 always),
// so their style.top = viewport Y directly. They're outside #sidebar-content and not
// affected by its translateY.
let clockNaturalTop    = null;
let clockNaturalBottom = null;

function initSidebarAlignment() {
  const contentEl      = document.getElementById('sidebar-content');
  const clockDisplayEl = document.querySelector('.clock-display');
  const sidebarNowEl   = document.getElementById('sidebarNow');
  if (!contentEl || !clockDisplayEl || !sidebarNowEl) return;
  contentEl.style.transform = 'translateY(0)';
  clockNaturalTop    = clockDisplayEl.getBoundingClientRect().top;
  clockNaturalBottom = sidebarNowEl.getBoundingClientRect().bottom;
}

function alignSidebar(state) {
  // Skip during rubber-band overscroll — let it settle naturally
  if (window.scrollY < 0 || document.body.scrollTop < 0) return;

  const contentEl     = document.getElementById('sidebar-content');
  const clockMetaEl   = document.getElementById('clock-ampm');
  const sidebarNextEl = document.getElementById('sidebar-next');
  if (!contentEl || clockNaturalTop === null) return;

  if (state.state === 'during') {
    // Clock: translateY so clock-display top aligns with now period-name top
    const nowNameEl = document.querySelector('.period-row.now .period-name');
    if (nowNameEl) {
      const delta = nowNameEl.getBoundingClientRect().top - clockNaturalTop;
      contentEl.style.transform = `translateY(${delta}px)`;
    }

    // PM meta: bottom aligns with track meta row's bottom (baseline proxy for single-line)
    const nowMetaEl = document.querySelector('.period-row.now .period-row-meta');
    if (nowMetaEl && clockMetaEl) {
      const trackMetaBottom = nowMetaEl.getBoundingClientRect().bottom;
      clockMetaEl.style.top = (trackMetaBottom - clockMetaEl.offsetHeight) + 'px';
    }

    // Next: probe-span baseline — inline elements report actual text-bottom,
    // not padded block box. Delta converges in one step on every call.
    const nextNameEl = document.querySelector('.period-row.next-period .period-name');
    if (nextNameEl && sidebarNextEl) {
      const probe        = nextNameEl.querySelector('.baseline-probe');
      const sidebarProbe = sidebarNextEl.querySelector('.baseline-probe');
      if (probe && sidebarProbe) {
        const delta = probe.getBoundingClientRect().bottom - sidebarProbe.getBoundingClientRect().bottom;
        // -4px optical offset: Cormorant has less descender space below baseline than
        // IBM Plex Mono, so box.bottom sits closer to baseline. Named constant is more
        // honest than pretending font metrics resolve perfectly.
        const FONT_DESCENDER_OFFSET = 3;
        sidebarNextEl.style.top = ((parseFloat(sidebarNextEl.style.top) || 0) + delta - FONT_DESCENDER_OFFSET) + 'px';
      }
    }

  } else {
    // Default: clock at natural position, meta and next stacked below it
    contentEl.style.transform = 'translateY(0)';
    if (clockMetaEl && clockNaturalBottom !== null) {
      clockMetaEl.style.top = clockNaturalBottom + 'px';
    }
    if (sidebarNextEl && clockMetaEl && clockNaturalBottom !== null) {
      sidebarNextEl.style.top = (clockNaturalBottom + clockMetaEl.offsetHeight + 8) + 'px';
    }
  }
}

// ══════════════════════════════
// PLACED MODE
// ══════════════════════════════
function updatePlacedMode() {
  document.body.classList.toggle('placed', window.innerWidth > window.innerHeight * 1.4);
}
window.addEventListener('resize', updatePlacedMode);
window.addEventListener('resize', () => {
  _refreshConnGeo();
  if (_currentState) positionConnector(_currentState, _connGeo);
  initSidebarAlignment(); // re-baseline clock natural top after resize
  if (_currentState) alignSidebar(_currentState);
});
updatePlacedMode();

// ══════════════════════════════
// MAIN TICK
// ══════════════════════════════
let _lastMinute = -1;

function tick() {
  const now   = new Date();
  const state = getScheduleState(now);
  const min   = now.getHours() * 60 + now.getMinutes();

  _currentState = state; // stored for scroll/resize listeners

  // Day-specific service routing — update serviceId on each tick so
  // Enter Service link and ambient audio always match today's recording
  const _dayName = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][now.getDay()];
  const _mornSvc = SCHEDULE.find(p => p.id === 'morning-service');
  if (_mornSvc) _mornSvc.serviceId = `morning-service-${_dayName}`;
  const _evenSvc = SCHEDULE.find(p => p.id === 'evening-service');
  if (_evenSvc) _evenSvc.serviceId = `evening-service-${_dayName}`;

  // Quiet mode: dark inversion during 10pm–4:30am
  document.body.classList.toggle('quiet-mode', state.state === 'during' && state.period.type === 'quiet');

  updateClock(now);
  updateSidebar(state, now);

  if (min !== _lastMinute || !_trackEverBuilt) {
    buildTrack(state);
    _lastMinute = min;
    // Re-align and re-cache geometry after track rebuild — row positions shift after scrollToNow settles
    setTimeout(() => { if (_currentState) { _refreshConnGeo(); alignSidebar(_currentState); } }, 60);
  }
}

tick();
initSidebarAlignment(); // baseline clock natural top after initial render
_refreshConnGeo();
alignSidebar(_currentState);
window._scheduleTick = tick; // AudioEngine hooks in via this
setInterval(tick, 1000);

// ── CROSS ANIMATION LOOP ──
// Runs at 60fps using cached geometry — no getBoundingClientRect() calls per frame.
// Cache is refreshed on scroll, resize, and minute change (not every second).
(function _animateCross() {
  if (_currentState && _connGeo) positionConnector(_currentState, _connGeo);
  requestAnimationFrame(_animateCross);
})();
</script>

      const start = periodStartSeconds(period);
      const windowStart = start - HAN_LEAD_MINUTES * 60;
      if (now >= windowStart && now < start) return { period, elapsed: now - windowStart };
    }
    return null;
  }

  function tickHan() {
    const target = getHanTarget();
    if (!target) {
      if (hanAudio) { hanAudio = stopAndClear(hanAudio); hanTriggeredFor = null; }
      return;
    }
    const { period, elapsed } = target;
    if (hanTriggeredFor === period.id && hanAudio && !hanAudio.paused) return;

    hanTriggeredFor = period.id;
    hanAudio = getAudio(AUDIO_FILES.han);
    hanAudio.muted = isMuted;

    hanAudio.addEventListener('loadedmetadata', () => {
      hanDuration = hanAudio.duration;
      const windowDuration = HAN_LEAD_MINUTES * 60;
      if (hanDuration >= windowDuration - 5) {
        hanAudio.currentTime = Math.min(elapsed, hanDuration - 1);
        hanAudio.loop = false;
      } else {
        hanAudio.loop = true;
        hanAudio.currentTime = elapsed % hanDuration;
      }
      hanAudio.play().catch(err => {
        console.warn('[AudioEngine] han play() failed:', err.name, err.message);
        document.addEventListener('click', () => {
          if (hanAudio) hanAudio.play().catch(e => console.warn('[AudioEngine] han retry failed:', e.name, e.message));
        }, { once: true });
      });
    }, { once: true });
    hanAudio.load();
  }

  /* ── Ambient service ── */
  function tickAmbient(currentState) {
    // state.state === 'during' is the active-period signal in this codebase
    if (!currentState || currentState.state !== 'during') {
      if (ambientAudio) { ambientAudio = stopAndClear(ambientAudio); activeServiceId = null; }
      return;
    }

    const period = currentState.period;
    if (!period.hasService || !SERVICE_AUDIO[period.serviceId]) {
      if (ambientAudio) { ambientAudio = stopAndClear(ambientAudio); activeServiceId = null; }
      return;
    }

    if (activeServiceId === period.serviceId && ambientAudio && !ambientAudio.paused) return;

    if (ambientAudio) stopAndClear(ambientAudio);
    activeServiceId = period.serviceId;
    ambientAudio = getAudio(SERVICE_AUDIO[period.serviceId]);
    ambientAudio.volume = 0;
    ambientAudio.muted = isMuted;

    const elapsedSeconds = nowSeconds() - periodStartSeconds(period);
    ambientAudio.addEventListener('loadedmetadata', () => {
      const seekTo = Math.min(Math.max(elapsedSeconds, 0), ambientAudio.duration - 1);
      ambientAudio.currentTime = seekTo;
      ambientAudio.play().then(() => {
        fadeIn(ambientAudio, AMBIENT_VOLUME, FADE_DURATION_MS);
      }).catch(err => {
        console.warn('[AudioEngine] ambient play() failed:', err.name, err.message);
        document.addEventListener('click', () => {
          if (ambientAudio) ambientAudio.play().then(() => {
            fadeIn(ambientAudio, AMBIENT_VOLUME, FADE_DURATION_MS);
          }).catch(e => console.warn('[AudioEngine] ambient retry failed:', e.name, e.message));
        }, { once: true });
      });
    }, { once: true });
    ambientAudio.load();
  }

  document.addEventListener('visibilitychange', () => {
    if (!ambientAudio) return;
    if (document.hidden) {
      ambientAudio.pause();
    } else {
      if (activeServiceId) {
        const period = SCHEDULE.find(p => p.serviceId === activeServiceId);
        if (period) {
          const elapsed = nowSeconds() - periodStartSeconds(period);
          if (elapsed >= 0 && elapsed < ambientAudio.duration) ambientAudio.currentTime = elapsed;
        }
      }
      ambientAudio.play().catch(err => console.warn('[AudioEngine] ambient visibilitychange resume failed:', err.name, err.message));
    }
  });

  /* ── Period transition bell ── */
  let firstTick = true;

  function tickBell(currentPeriodId) {
    if (firstTick) { firstTick = false; lastPeriodId = currentPeriodId; return; }
    if (currentPeriodId && currentPeriodId !== lastPeriodId) {
      lastPeriodId = currentPeriodId;
      playDensho();
    }
  }

  function playDensho() {
    if (denshoAudio && !denshoAudio.ended) return;
    denshoAudio = getAudio(AUDIO_FILES.densho);
    denshoAudio.volume = 1;
    denshoAudio.muted = isMuted;
    denshoAudio.play().catch(err => console.warn('[AudioEngine] densho play() failed:', err.name, err.message));
  }

  /* ── Wake-up bell — plays once at period start, no loop ── */
  let wakeupPlaying = false;
  let wakeupAudio   = null;

  function tickWakeup(state) {
    if (state && state.state === 'during' && state.period.id === 'wake-up-bell') {
      if (!wakeupPlaying) {
        wakeupAudio = new Audio('audio/SFZC/koten-and-shinrei-wakeup.mp3');
        wakeupAudio.volume = isMuted ? 0 : 0.8;
        wakeupAudio.muted  = isMuted;
        wakeupAudio.play().catch(err => console.warn('[AudioEngine] wakeup play() failed:', err.name, err.message));
        wakeupPlaying = true;
      }
    } else {
      wakeupPlaying = false;
      if (wakeupAudio && !wakeupAudio.ended) { wakeupAudio.pause(); wakeupAudio = null; }
    }
  }

  /* ── Enter Service ?t= handoff ── */
  function updateEnterServiceLink() {
    const btn = document.querySelector('[data-enter-service]')
             || document.querySelector('a[href*="service="]');
    if (!btn) return;
    const href  = btn.getAttribute('href') || '';
    const match = href.match(/service=([^&]+)/);
    if (!match) return;
    const period = SCHEDULE.find(p => p.serviceId === match[1]);
    if (!period) return;
    const elapsed = Math.max(0, nowSeconds() - periodStartSeconds(period));
    btn.href = `${href.split('?')[0]}?service=${match[1]}&t=${Math.floor(elapsed)}`;
  }

  /* ── Mobile clock ── */
  function updateMobileClock() {
    const mobileClock = document.getElementById('mobile-clock');
    if (!mobileClock) return;
    const now = new Date();
    const h = now.getHours() % 12 || 12; // 12h, no padding
    const m = String(now.getMinutes()).padStart(2, '0');
    mobileClock.textContent = `${h}:${m}`;

    const mobileNext = document.getElementById('mobile-next');
    if (mobileNext) {
      // state.next is the next period in this codebase (not state.nextPeriod)
      const state = getScheduleState(new Date());
      if (state && state.next) {
        const nextMin = state.next.time[0] * 60 + state.next.time[1];
        const nowMin  = now.getHours() * 60 + now.getMinutes();
        const diff    = nextMin - nowMin;
        if (diff > 0) {
          const hh = Math.floor(diff / 60), mm = diff % 60;
          mobileNext.textContent = `${hh > 0 ? hh + 'h ' : ''}${mm}m · ${state.next.name}`;
        }
      }
    }
  }

  function isServiceAvailable(serviceId) {
    return Object.prototype.hasOwnProperty.call(SERVICE_AUDIO, serviceId);
  }

  /* ── Main tick ── */
  function tick() {
    _checkAudioContext();
    // state.state === 'during' is active-period in this codebase
    const state = typeof getScheduleState === 'function' ? getScheduleState(new Date()) : null;
    const currentPeriodId = state && state.state === 'during' ? state.period.id : null;

    tickWakeup(state);
    tickHan();
    tickAmbient(state);
    tickBell(currentPeriodId);
    updateEnterServiceLink();
    updateMobileClock();
  }

  function init() {
    const originalTick = window._scheduleTick;
    if (typeof originalTick === 'function') {
      window._scheduleTick = () => { originalTick(); tick(); };
    } else {
      setInterval(tick, 1000);
    }
    tick();
  }

  /* ── iOS audio unlock ── */
  /* Plays and immediately pauses a silent audio element to satisfy iOS's
     "audio must be initiated by user gesture" requirement. Call once from
     a tap handler, before any scheduled audio needs to play. */
  function unlock() {
    const silent = new Audio();
    silent.src = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAACAAACcQCAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICA//////////////////////////////////////////////////////////////////8AAAA5TGFMZTU4LjI5LjEwMAAAAAAAAAAUgAAAAAAAAAJxKr0QAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//OEZAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA////////////////////////////////////////////////////////////////////////AAAAAExhdmY1OC4yOS4xMDAAAAAAAAAAAACQAAAAAAAAAnEqvRAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=';
    silent.volume = 0;
    silent.play().then(() => { silent.pause(); }).catch(() => {});
  }

  return { init, tick, applyMute, unlock, isServiceAvailable };

})();

/* ── Boot ── */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', AudioEngine.init);
} else {
  AudioEngine.init();
}

/* ── Screen Wake Lock ──
   Prevents the screen from sleeping while the tab is active.
   Re-acquired on visibility restore (e.g. after phone wake).
   Fails silently on unsupported browsers. ── */
const WakeLock = (() => {
  let lock = null;

  async function request() {
    if (!('wakeLock' in navigator)) return;
    try {
      lock = await navigator.wakeLock.request('screen');
      lock.addEventListener('release', () => { lock = null; });
    } catch (e) { /* denied or interrupted — non-fatal */ }
  }

  function onVisibilityChange() {
    if (document.visibilityState === 'visible') request();
  }

  return { request, onVisibilityChange };
})();

document.addEventListener('visibilitychange', WakeLock.onVisibilityChange);

/* ── iOS first-visit audio activation overlay ──
   Touch devices only. sessionStorage prevents repeat on refresh.
   Tap unlocks the iOS audio context, then dismisses. ── */
(function () {
  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (!isTouchDevice) return;
  if (sessionStorage.getItem('gv-audio-unlocked')) return;

  const overlay = document.createElement('div');
  overlay.id = 'audio-unlock-overlay';
  overlay.style.cssText = [
    'position:fixed', 'inset:0', 'z-index:500',
    'background:#f4f0e8',   /* --paper */
    'display:flex', 'flex-direction:column',
    'align-items:center', 'justify-content:center',
    'cursor:pointer',
    'transition:opacity 0.4s ease',
  ].join(';');

  overlay.innerHTML = `
    <span style="
      font-family:'Cormorant',serif;
      font-size:24px;
      font-weight:400;
      color:#1a1814;
      letter-spacing:-0.01em;
      opacity:0.82;
      pointer-events:none;
    ">Tap to enter</span>
    <span style="
      font-family:'IBM Plex Mono',monospace;
      font-size:9px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color:#1a1814;
      opacity:0.3;
      margin-top:14px;
      pointer-events:none;
    ">Great Vows · SFZC</span>
  `;

  overlay.addEventListener('click', function () {
    AudioEngine.unlock();
    WakeLock.request(); // user gesture — same tap acquires wake lock
    sessionStorage.setItem('gv-audio-unlocked', '1');
    overlay.style.opacity = '0';
    setTimeout(function () { overlay.remove(); }, 420);
  }, { once: true });

  document.body.appendChild(overlay);
}());
</script>
