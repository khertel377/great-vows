<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Schedule — Great Vows</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Cormorant:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ══════════════════════════════
   TYPE SYSTEM — Great Vows Schedule
   Five roles. Two families. No other combinations permitted.

   Headline  — Cormorant, 400, 54px (now-row + clock) / 20px (other rows)
   Meta      — IBM Plex Mono, 400, 12px, opacity 0.45, letter-spacing 0.05em, uppercase for AM/PM
   Label     — Cormorant italic, 400, 15px, opacity 0.38
   Value     — IBM Plex Mono, 400, 12px, opacity 0.5
   Inst.     — IBM Plex Mono, 400, 10px, letter-spacing 0.15em, uppercase, opacity 0.3
══════════════════════════════ */

:root {
  --ink: #1a1814;
  --paper: #f4f0e8;
  --seal: #B03A2E;
  --op-past: 0.32;
  --op-future: 0.65;
  --mono: 'IBM Plex Mono', monospace;
  --serif: 'Cormorant', serif;
  --sab: env(safe-area-inset-bottom, 0px);
}

html {
  background: var(--paper);
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--mono);
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(26,24,20,0.14) transparent;
  transition: background 4s ease;
}

body.after-schedule {
  background: #f0ebe0; /* slightly warmer at end of day */
}

body::-webkit-scrollbar { width: 3px; }
body::-webkit-scrollbar-track { background: transparent; }
body::-webkit-scrollbar-thumb { background: rgba(26,24,20,0.14); }

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  opacity: 0.3;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── APP SHELL ── */
#layout {
  display: flex;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

.sidebar-header {
  position: fixed;
  top: 20px;
  left: 20px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink);
  opacity: 0.3;
  line-height: 1.6;
  z-index: 5;
  pointer-events: none;
}

.sidebar-now {
  padding-bottom: 12px; /* descender clearance — Cormorant 7 drops below baseline */
}

.clock-display {
  display: flex;
  align-items: baseline;
  letter-spacing: -0.01em;
  overflow: visible;
}

.sidebar-next {
  display: flex;
  align-items: baseline;
  gap: 10px;
  white-space: nowrap;
  margin-top: 6px;
}

.next-label {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  font-weight: 400;
  color: var(--ink);
  opacity: 0.38;
  line-height: 1;
}

.next-value {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.03em;
  color: var(--ink);
  opacity: 0.5;
  line-height: 1;
}

.clock-hm,
.clock-sep,
.clock-sec {
  font-family: var(--serif);
  font-size: 54px;
  font-weight: 400;
  line-height: 1;
  color: var(--ink);
  opacity: 1;
}

.clock-sep {
  opacity: 0.25;
  transition: opacity 0.45s ease-in-out;
}

.clock-sep.pulse { opacity: 0.85; }

.enter-btn {
  display: inline-block;
  margin-top: 12px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--ink);
  text-decoration: none;
  border: 1px solid rgba(26,24,20,0.28);
  padding: 7px 11px;
  opacity: 0.65;
  transition: opacity 0.2s;
}

.enter-btn:hover { opacity: 1; }
.enter-btn.hidden { display: none; }

/* ── PERIOD ROW CELLS ── */
.period-left {
  width: 280px;
  flex-shrink: 0;
  padding: 10px 20px;
}

.period-right {
  flex: 1;
  padding: 10px 16px 10px 24px;
  border-left: 1px solid rgba(26,24,20,0.12);
  position: relative;
}

/* ══════════════════════════════
   SCHEDULE TRACK
══════════════════════════════ */
#track {
  flex: 1;
  padding: 20px 0 80px 0;
}

/* ── PERIOD ROWS ── */
.period-row {
  display: flex;
  transition: opacity 0.3s ease;
  cursor: default;
  user-select: none;
}

.period-row.past   { opacity: var(--op-past); }
.period-row.future { opacity: var(--op-future); }

/* Now-row: grid layout for cross-column alignment without JS */
.period-row.now {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-areas:
    "clock  name "
    "ampm   meta "
    "next   .    "
    "enter  .    ";
  position: sticky;
  top: 0;
  background: var(--paper);
  z-index: 2;
  opacity: 1 !important; /* immune to neighbor data-hover dim */
}

/* Vertical red bar at column boundary */
.period-row.now::before {
  content: '';
  position: absolute;
  left: 280px;
  top: 0;
  bottom: 0;
  width: 3px;
  transform: translateX(-50%);
  background: var(--seal);
  pointer-events: none;
}

/* Grid area assignments */
.period-row.now .clock-display   { grid-area: clock; align-self: end;      padding: 10px 20px 0; }
.period-row.now .clock-meta      { grid-area: ampm;  align-self: baseline; padding: 8px 20px 0; }
.period-row.now .sidebar-next    { grid-area: next;  margin-top: 8px; padding: 0 20px 0; }
.period-row.now .enter-btn       { grid-area: enter;                       padding: 0 20px 10px; }
.period-row.now .period-name     { grid-area: name;  align-self: end;      padding: 10px 24px 0 24px; }
.period-row.now .period-row-meta { grid-area: meta;  align-self: baseline; padding: 8px 16px 10px 24px; }

/* Tick mark — on now-row itself so it travels full row height */
.period-row.now::after {
  content: '';
  position: absolute;
  left: 280px;
  top: calc(var(--tick-progress, 0.1) * 100%);
  transform: translate(-50%, -50%);
  width: 10px;
  height: 3px;
  background: var(--seal);
  pointer-events: none;
}


/* Imminent: next period when we're in a gap — slightly brighter */
.period-row.imminent { opacity: 0.82; }

/* After-schedule: very dim — day is done */
body.after-schedule .period-row.past { opacity: 0.18; }

/* Closing rule — end of day */
#closing-rule {
  height: 0.5px;
  background: var(--ink);
  opacity: 0.2;
  margin: 0 0 0 24px;
}

/* Hover surfacing — suppressed during touch scroll so ghost hovers don't fire */
body:not(.is-scrolling) .period-row[data-hover="active"]   { opacity: 0.88; }
body:not(.is-scrolling) .period-row[data-hover="neighbor"] { opacity: 0.55; }
body.is-scrolling .period-row:not(.now):hover .period-row-meta { opacity: 0; }

/* Scroll surfacing */
#track.scrolling .period-row.past   { opacity: 0.68; }
#track.scrolling .period-row.future { opacity: 0.68; }

/* ── ROW CONTENT ── */
.period-name {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.2;
  padding-bottom: 8px;
  overflow: visible;
}

/* Now row: period name matches clock — with transition so it grows in smoothly */
.period-row.now .period-name {
  font-size: 54px;
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.01em;
  transition: font-size 0.6s ease, opacity 0.6s ease;
}

/* Period entering: start small, grow into the now size */
.period-row.now.period-enter .period-name {
  animation: periodNameEnter 0.6s ease forwards;
}
@keyframes periodNameEnter {
  from { font-size: 20px; opacity: 0.5; letter-spacing: 0em; }
  to   { font-size: 54px; opacity: 1;   letter-spacing: -0.01em; }
}

.period-row-meta {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 400;
  color: var(--ink);
  opacity: 0.45;
  letter-spacing: 0.05em;
  line-height: 1;
  white-space: nowrap;
  transition: opacity 0.3s ease;
}

.period-row:not(.now) .period-row-meta { opacity: 0; }

.period-row:not(.now):hover .period-row-meta,
.period-row:not(.now)[data-hover="active"] .period-row-meta,
.period-row:not(.now).meta-visible .period-row-meta { opacity: 0.45; }

.period-row.now .period-row-meta {
  font-size: 12px;
  opacity: 0.55;
}

/* ── AUDIO DOT ── */
.audio-dot {
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ink);
  opacity: 0.3;
  margin-right: 6px;
  vertical-align: middle;
  flex-shrink: 0;
}
.period-row.now .audio-dot { opacity: 0.5; }

/* Dev tool: whole row is the click target */
.period-row[data-audio],
.period-row[data-bell]  { cursor: pointer; }
@keyframes audioDotPulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50%       { opacity: 0.9; transform: scale(1.8); }
}
.period-row.playing .audio-dot {
  animation: audioDotPulse 1.2s ease-in-out infinite;
}


/* Ambient audio status dot — lives in clock-meta, gold when loop is playing */
#ambient-dot {
  position: absolute;
  top: 2px;
  right: -10px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #B8860B;
  opacity: 0;
  transition: opacity 0.4s;
}
#ambient-dot.playing {
  opacity: 0.6;
  animation: dot-pulse 2s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%, 100% { opacity: 0.6; }
  50%       { opacity: 0.25; }
}

/* Clock meta — AM/PM */
.clock-meta {
  position: relative;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
  color: var(--ink);
  opacity: 0.45;
  line-height: 1;
}

/* ══════════════════════════════
   QUIET MODE — dark inversion during 10pm–5:10am
══════════════════════════════ */
body.quiet-mode {
  background: #1a1814;
}
body.quiet-mode .period-name,
body.quiet-mode .clock-display,
body.quiet-mode #mobile-clock {
  color: rgba(244,240,232,0.9);
}
body.quiet-mode .period-row-meta,
body.quiet-mode .clock-meta,
body.quiet-mode .sidebar-next {
  color: rgba(244,240,232,0.35);
}
body.quiet-mode .period-row.now {
  background: #1a1814; /* now-row has explicit bg; must override for sticky scrim to work */
}
body.quiet-mode .period-right {
  border-left-color: rgba(244,240,232,0.12);
}
body.quiet-mode .period-row.now::before,
body.quiet-mode .period-row.now::after {
  background: rgba(244,240,232,0.7);
}
body.quiet-mode .audio-dot { background: rgba(244,240,232,0.9); }
body.quiet-mode .sidebar-header {
  color: rgba(244,240,232,0.9);
}
/* clock children have explicit color:var(--ink) — must override directly */
body.quiet-mode .clock-hm,
body.quiet-mode .clock-sec {
  color: rgba(244,240,232,0.9);
}
body.quiet-mode .clock-sep {
  color: rgba(244,240,232,0.9);
  opacity: 0.45;
}
body.quiet-mode .clock-sep.pulse { opacity: 0.85; }

/* ══════════════════════════════
   PLACED MODE (landscape ≥ 1.4:1)
══════════════════════════════ */
body.placed {
  --op-past: 0.22;
  --op-future: 0.55;
}

body.placed .clock-hm,
body.placed .clock-sep,
body.placed .clock-sec  { font-size: 52px; }
body.placed .period-row.now .period-name { font-size: 52px; }
</style>
</head>
<body>

<div class="sidebar-header">San Francisco<br>Zen Center</div>

<div id="layout">
  <main id="track"></main>
</div>

<script>
// ══════════════════════════════
// DEBUG TIME SHIM
// ══════════════════════════════
let _debugOffset = 0;
function getNow() {
  return _debugOffset ? new Date(Date.now() + _debugOffset) : new Date();
}

// ══════════════════════════════
// DATA
// ══════════════════════════════
const SCHEDULE = [
  { id: 'quiet-morning',  time: [0,0],   end: [4,30],  name: 'Quiet',                 type: 'quiet', hasService: false },
  { id: 'wake-up-bell',   time: [4,30],  end: [4,45],  name: 'Wake-up Bell',          type: 'bell',  hasService: false, audio: 'audio/sfzc/koten-and-shinrei-wakeup.mp3' },
  { id: 'han',            time: [4,45],  end: [5,0],   name: 'Han',                   type: 'bell',  hasService: false, audio: 'audio/sfzc/temple_sounds-the_han.mp3' },
  { id: 'zazen-morning',  time: [5,0],   end: [6,30],  name: 'Zazen',                 type: 'zazen', hasService: false, bell: 'audio/sfzc/3_Floor_Bells.mp3', bellEnd: 'audio/sfzc/morning_zazen_end.mp3' },
  { id: 'morning-service',time: [6,30],  end: [7,0],   name: 'Morning Service',       type: 'chant', hasService: true  },
  { id: 'soji',           time: [7,0],   end: [7,20],  name: 'Soji',                  type: 'work',  hasService: false },
  { id: 'breakfast',      time: [7,20],  end: [8,10],  name: 'Breakfast',             type: 'meal',  hasService: false },
  { id: 'study-hall',     time: [8,10],  end: [9,10],  name: 'Study Hall',            type: 'study', hasService: false, bell: 'audio/sfzc/study-bell.mp3', bellEnd: 'audio/sfzc/study-bell.mp3' },
  { id: 'work-morning',   time: [9,10],  end: [12,15], name: 'Work Period',           type: 'work',  hasService: false, bell: 'audio/sfzc/railroad-bell.mp3' },
  { id: 'midday-service', time: [12,15], end: [12,30], name: 'Mid-day Service',       type: 'chant', hasService: false },
  { id: 'lunch',          time: [12,30], end: [13,15], name: 'Lunch',                 type: 'meal',  hasService: false },
  { id: 'work-afternoon', time: [13,15], end: [15,0],  name: 'Afternoon Work',        type: 'work',  hasService: false, bell: 'audio/sfzc/railroad-bell.mp3' },
  { id: 'personal',       time: [15,0],  end: [17,15], name: 'Personal Time',type: 'rest',  hasService: false },
  { id: 'zazen-evening',  time: [17,15], end: [17,50], name: 'Zazen',                 type: 'zazen', hasService: false, bell: 'audio/sfzc/3_Floor_Bells.mp3' },
  { id: 'evening-service',time: [17,50], end: [18,0],  name: 'Evening Service',       type: 'chant', hasService: true  },
  { id: 'dinner',         time: [18,0],  end: [19,30], name: 'Dinner',                type: 'meal',  hasService: false },
  { id: 'zazen-night',    time: [19,30], end: [20,50], name: 'Zazen',                 type: 'zazen', hasService: false, bell: 'audio/sfzc/3_Floor_Bells.mp3' },
  { id: 'three-refuges',  time: [20,50], end: [21,0],  name: 'Three Refuges',         type: 'chant', hasService: false },
  { id: 'firewatch-bell',     time: [21,0],  end: [21,30], name: 'Firewatch',             type: 'quiet', hasService: false, audio: 'audio/sfzc/konsho-evening-bell.mp3' },
  { id: 'firewatch-clappers', time: [21,30], end: [22,0],  name: 'Firewatch',             type: 'quiet', hasService: false, audio: 'audio/sfzc/firewatch-clappers.mp3' },
  { id: 'quiet-night',    time: [22,0],  end: [24,0],  name: 'Quiet',                 type: 'quiet', hasService: false },
];

// ══════════════════════════════
// STATE LOGIC
// Returns one of: 'before', 'during', 'between', 'after'
// 'between' includes prev period so connector can span the gap
// ══════════════════════════════
function getScheduleState(now) {
  const totalMins = now.getHours() * 60 + now.getMinutes();
  const firstStart = SCHEDULE[0].time[0] * 60 + SCHEDULE[0].time[1];

  // Before first period of the day
  if (totalMins < firstStart) {
    return { state: 'before', next: SCHEDULE[0], minsUntil: firstStart - totalMins };
  }

  for (let i = 0; i < SCHEDULE.length; i++) {
    const p     = SCHEDULE[i];
    const start = p.time[0] * 60 + p.time[1];
    const end   = p.end[0]  * 60 + p.end[1];

    // During this period
    if (totalMins >= start && totalMins < end) {
      const duration = (end - start) * 60;
      const elapsed  = (totalMins - start) * 60 + now.getSeconds();
      return { state: 'during', period: p, elapsed, duration };
    }

    // Gap after this period and before the next
    if (i < SCHEDULE.length - 1) {
      const nextStart = SCHEDULE[i + 1].time[0] * 60 + SCHEDULE[i + 1].time[1];
      if (totalMins >= end && totalMins < nextStart) {
        return { state: 'between', prev: p, next: SCHEDULE[i + 1], minsUntil: nextStart - totalMins };
      }
    }
  }

  // After last period
  return { state: 'after', next: SCHEDULE[0] };
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function fmtTime12(hm) {
  const h = hm[0] % 12 || 12;
  const ampm = hm[0] >= 12 ? 'PM' : 'AM';
  return h + ':' + pad2(hm[1]) + '\u202f' + ampm;
}

function formatDuration(mins) {
  if (mins < 60) return mins + ' min';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? h + 'h ' + m + 'm' : h + 'h';
}

function periodDurMins(p) {
  return (p.end[0] * 60 + p.end[1]) - (p.time[0] * 60 + p.time[1]);
}

function rowHeight(mins) {
  return Math.round(28 + 6 * Math.sqrt(mins));
}

// Next value for 'during' state — time until next period starts
function formatNextValue(currentPeriod, now) {
  const currentIdx    = SCHEDULE.indexOf(currentPeriod);
  const next          = SCHEDULE[currentIdx + 1];
  if (!next) return 'last';
  const nextStartMins = next.time[0] * 60 + next.time[1];
  const nowMins       = now.getHours() * 60 + now.getMinutes();
  const minsUntil     = nextStartMins - nowMins;
  if (minsUntil <= 0) return 'soon';
  return formatDuration(minsUntil);
}

// Duration from now until Han tomorrow
function formatUntilTomorrow(now) {
  const han     = SCHEDULE.find(p => p.id === 'han');
  const hanMins = han ? han.time[0] * 60 + han.time[1] : 310;
  const nowMins = now.getHours() * 60 + now.getMinutes();
  return 'in ' + formatDuration((24 * 60 - nowMins) + hanMins);
}

// ══════════════════════════════
// TICK POSITION
// ══════════════════════════════
function updateTickPosition(state) {
  if (!state || state.state !== 'during') return;
  const p = state.period;
  const start = p.time[0] * 3600 + p.time[1] * 60;
  const end   = p.end[0]  * 3600 + p.end[1]  * 60;
  const now   = (Date.now() + _debugOffset) / 1000;
  const midnight = getNow(); midnight.setHours(0,0,0,0);
  const elapsed  = now - (midnight.getTime() / 1000 + start);
  const progress = Math.max(0, Math.min(1, elapsed / (end - start)));
const nowRow = document.querySelector('.period-row.now');
  if (!nowRow) return;
  nowRow.style.setProperty('--tick-progress', progress);
}

// ══════════════════════════════
// CLOCK
// ══════════════════════════════
function updateClock(now) {
  const hmEl   = document.getElementById('clock-hm');
  const secEl  = document.getElementById('clock-sec');
  const ampmEl = document.getElementById('clock-ampm');
  if (!hmEl) return; // clock lives in now-row; not yet injected on first tick

  const h = now.getHours() % 12 || 12;
  hmEl.textContent   = h + ':' + pad2(now.getMinutes());
  secEl.textContent  = pad2(now.getSeconds());
  // Update AM/PM text node without disturbing the #ambient-dot span
  const ampmText = now.getHours() >= 12 ? 'PM' : 'AM';
  let ampmNode = Array.from(ampmEl.childNodes).find(n => n.nodeType === Node.TEXT_NODE);
  if (ampmNode) { ampmNode.textContent = ampmText; }
  else { ampmEl.appendChild(document.createTextNode(ampmText)); }

  document.querySelectorAll('.colon').forEach(c => {
    c.classList.add('pulse');
    setTimeout(() => c.classList.remove('pulse'), 900);
  });
}

// ══════════════════════════════
// SIDEBAR TEXT
// ══════════════════════════════
function updateSidebar(state, now) {
  const nextLabelEl = document.getElementById('next-label');
  const nextValueEl = document.getElementById('next-value');
  const enterBtn    = document.getElementById('enterBtn');
  if (!nextLabelEl) return; // injected into now-row; absent before first buildTrack

  if (state.state === 'during') {
    nextLabelEl.textContent = 'Next';
    nextValueEl.textContent = formatNextValue(state.period, now);
    if (state.period.hasService && (typeof AudioEngine === 'undefined' || AudioEngine.isServiceAvailable(state.period.serviceId))) {
      enterBtn.classList.remove('hidden');
      enterBtn.href = 'index.html?service=' + state.period.serviceId;
    } else {
      enterBtn.classList.add('hidden');
    }
  } else if (state.state === 'between') {
    nextLabelEl.textContent = 'Next';
    nextValueEl.textContent = 'in ' + formatDuration(state.minsUntil);
    enterBtn.classList.add('hidden');
  } else if (state.state === 'before') {
    nextLabelEl.textContent = 'Next';
    nextValueEl.textContent = formatDuration(state.minsUntil);
    enterBtn.classList.add('hidden');
  } else {
    // after
    nextLabelEl.textContent = 'Tomorrow';
    nextValueEl.textContent = formatUntilTomorrow(now);
    enterBtn.classList.add('hidden');
  }
}

// ══════════════════════════════
// SCROLL TO NOW
// ══════════════════════════════
function scrollToNow(behavior) {
  const target = document.querySelector('.period-row.now') || document.querySelector('.period-row.future');
  if (!target) return;
  const rowTop       = target.getBoundingClientRect().top + window.scrollY;
  const scrollTarget = rowTop - window.innerHeight / 2 + target.offsetHeight / 2;
  window.scrollTo({ top: Math.max(0, scrollTarget), behavior: behavior || 'instant' });
}

// ══════════════════════════════
// TRACK BUILD
// ══════════════════════════════
let _lastNowId      = undefined;
let _trackEverBuilt = false;

function buildTrack(state) {
  const track     = document.getElementById('track');
  const nowId     = state.state === 'during' ? state.period.id : null;
  const newPeriod = nowId !== _lastNowId;
  const now       = getNow();
  const totalMins = now.getHours() * 60 + now.getMinutes();
  const nowIdx    = nowId ? SCHEDULE.findIndex(p => p.id === nowId) : -1;

  // Body state class for after-schedule styling
  document.body.classList.toggle('after-schedule', state.state === 'after');

  track.innerHTML = '';

  SCHEDULE.forEach((p, i) => {
    const endM    = p.end[0] * 60 + p.end[1];
    const durMins = periodDurMins(p);

    // Row classification
    let rowClass;
    if (state.state === 'before') {
      rowClass = 'future';
    } else if (state.state === 'after') {
      rowClass = 'past';
    } else if (nowId === p.id) {
      rowClass = 'now';
    } else if (totalMins >= endM) {
      rowClass = 'past';
    } else {
      rowClass = 'future';
    }

    const isNextPeriod = nowIdx !== -1 && i === nowIdx + 1;
    const isImminent   = state.state === 'between' && p.id === state.next.id;

    const row = document.createElement('div');
    row.dataset.periodId = p.id; // enables [data-period-id] selector
    row.dataset.idx      = i;
    if (p.audio)   row.dataset.audio   = p.audio;
    if (p.bell)    row.dataset.bell    = p.bell;
    if (p.bellEnd) row.dataset.bellEnd = p.bellEnd;
    row.style.minHeight  = rowHeight(durMins) + 'px';

    let classes = 'period-row ' + rowClass;
    if (isNextPeriod) classes += ' next-period';
    if (isImminent)   classes += ' imminent';
    row.className = classes;

    // Period name grows in on live period change
    if (rowClass === 'now' && newPeriod && _trackEverBuilt) {
      row.classList.add('period-enter');
      setTimeout(() => row.classList.remove('period-enter'), 700);
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'period-name';

    if (p.audio || p.bell || p.bellEnd) {
      const dot = document.createElement('span');
      dot.className = 'audio-dot';
      nameEl.appendChild(dot);
    }

    const isContinuation = i > 0 && SCHEDULE[i - 1].name === p.name;
    if (!isContinuation) {
      if (isNextPeriod) {
        const probe = document.createElement('span');
        probe.className = 'baseline-probe';
        probe.textContent = p.name;
        nameEl.appendChild(probe);
      } else {
        nameEl.appendChild(document.createTextNode(p.name));
      }
    }

    const metaEl = document.createElement('div');
    metaEl.className   = 'period-row-meta';
    metaEl.textContent = fmtTime12(p.time) + ' · ' + formatDuration(durMins);

    if (rowClass === 'now') {
      // Reset tick to 0 atomically with the class assignment — before any repaint
      row.style.setProperty('--tick-progress', '0');

      // Grid layout — six direct children, no wrapper divs
      const clockEl = document.createElement('div');
      clockEl.className = 'clock-display';
      clockEl.innerHTML =
        '<span class="clock-hm" id="clock-hm">--:--</span>' +
        '<span class="clock-sep colon">:</span>' +
        '<span class="clock-sec" id="clock-sec">--</span>';

      const ampmEl = document.createElement('div');
      ampmEl.className = 'clock-meta';
      ampmEl.id = 'clock-ampm';
      ampmEl.innerHTML = '<span class="audio-dot" id="ambient-dot"></span>';

      const nextEl = document.createElement('div');
      nextEl.className = 'sidebar-next';
      nextEl.id = 'sidebar-next';
      nextEl.innerHTML =
        '<span class="next-label" id="next-label">Next</span>' +
        '<span class="next-value baseline-probe" id="next-value"></span>';

      const enterEl = document.createElement('a');
      enterEl.className = 'enter-btn hidden';
      enterEl.id = 'enterBtn';
      enterEl.href = '#';
      enterEl.textContent = 'Enter service \u2192';

      row.appendChild(clockEl);
      row.appendChild(ampmEl);
      row.appendChild(nextEl);
      row.appendChild(enterEl);
      row.appendChild(nameEl);
      row.appendChild(metaEl);

    } else {
      // Flex layout — left/right cell wrappers
      const leftEl = document.createElement('div');
      leftEl.className = 'period-left';

      const rightEl = document.createElement('div');
      rightEl.className = 'period-right';
      rightEl.appendChild(nameEl);
      rightEl.appendChild(metaEl);

      row.appendChild(leftEl);
      row.appendChild(rightEl);
    }

    track.appendChild(row);
  });

  // Closing rule at end of day
  if (state.state === 'after') {
    const rule = document.createElement('div');
    rule.id = 'closing-rule';
    track.appendChild(rule);
  }

  _attachHoverHandlers();

  // Populate clock and sidebar immediately — no flash of --:-- before next tick
  updateClock(now);
  updateSidebar(state, now);

  if (!_trackEverBuilt) {
    setTimeout(() => {
      document.querySelector('.period-row.now')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 40);
  } else if (newPeriod) {
    requestAnimationFrame(() => {
      document.querySelector('.period-row.now')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }

  _lastNowId      = nowId;
  _trackEverBuilt = true;
  wireAudioDevTool();
}

// ══════════════════════════════
// TAP-TO-PLAY DEV TOOL
// Wired on every buildTrack() rebuild. Click an audio dot to play/pause.
// Requires sessionStorage['gv-audio-unlocked'] = '1' (set manually in console,
// or via AudioEngine.unlock() after a user gesture).
// ══════════════════════════════
function wireAudioDevTool() {
  document.querySelectorAll('.period-row[data-audio], .period-row[data-bell]').forEach(row => {
    row.addEventListener('click', (e) => {
      e.stopPropagation();

      // The tap itself is a user gesture — satisfy iOS unlock requirement
      sessionStorage.setItem('gv-audio-unlocked', '1');

      const src = row.dataset.audio || row.dataset.bell;
      if (!src) return;

      // Toggle: stop if this row is already playing
      if (_devPlayingRow === row && _devAudio && !_devAudio.paused) {
        _devAudio.pause();
        _devAudio = null;
        row.classList.remove('playing');
        _devPlayingRow = null;
        return;
      }

      // Stop whatever was playing before
      if (_devPlayingRow) _devPlayingRow.classList.remove('playing');
      if (_devAudio) { _devAudio.pause(); _devAudio = null; }

      // Fresh Audio object each time — eliminates pause/play race
      _devAudio = new Audio();
      _devAudio.src = src;
      _devAudio.muted = localStorage.getItem('gv-muted') === '1';
      _devAudio.onended = () => {
        row.classList.remove('playing');
        _devPlayingRow = null;
      };
      _devAudio.play().then(() => {
        _devAudio.muted = localStorage.getItem('gv-muted') === '1'; // set again after play resolves
      }).catch(err => console.warn('[DevTool] play() failed:', err.message));
      row.classList.add('playing');
      _devPlayingRow = row;
    });
  });
}

// ══════════════════════════════
// HOVER SURFACING + MOBILE META REVEAL
// ══════════════════════════════

// Track the one non-now row currently showing its meta on mobile
let _metaVisibleRow  = null;
let _metaDismissTimer = null;
let _metaObserver    = null;

function _clearMeta(row) {
  if (row) row.classList.remove('meta-visible');
  if (_metaDismissTimer) { clearTimeout(_metaDismissTimer); _metaDismissTimer = null; }
  if (_metaVisibleRow === row) _metaVisibleRow = null;
}

function _showMeta(row) {
  if (row.classList.contains('now')) return; // now-row always handled by CSS
  if (_metaVisibleRow && _metaVisibleRow !== row) _clearMeta(_metaVisibleRow);
  row.classList.add('meta-visible');
  _metaVisibleRow = row;
}

function _attachHoverHandlers() {
  const rows = Array.from(document.querySelectorAll('.period-row'));

  // ── Desktop hover surfacing ──
  rows.forEach((row, i) => {
    row.addEventListener('mouseenter', () => {
      rows.forEach(r => r.removeAttribute('data-hover'));
      row.dataset.hover = 'active';
      if (rows[i - 1]) rows[i - 1].dataset.hover = 'neighbor';
      if (rows[i + 1]) rows[i + 1].dataset.hover = 'neighbor';
    });
  });

  // ── Mobile only: tap to reveal meta (single open) ──
  // hover: none matches touch-primary devices without UA sniffing
  const isTouchDevice = window.matchMedia('(hover: none)').matches;
  if (!isTouchDevice) return;

  // Tap: toggle this row; close any other open row (single-open)
  rows.forEach(row => {
    row.addEventListener('click', (e) => {
      if (row.classList.contains('now')) return;
      if (row.classList.contains('meta-visible')) {
        _clearMeta(row);
      } else {
        _showMeta(row);
      }
      e.stopPropagation();
    });
  });
}

document.getElementById('track').addEventListener('mouseleave', () => {
  document.querySelectorAll('.period-row').forEach(r => r.removeAttribute('data-hover'));
});

// ══════════════════════════════
// SCROLL SURFACING
// ══════════════════════════════
let _scrollTimer   = null;
let _devAudio      = null; // shared audio element for tap-to-play dev tool
let _devPlayingRow = null;
let _ambientAudio       = null;
let _ambientPeriodId    = null;
let _pendingAmbientPlay = false;
window.addEventListener('scroll', () => {
  document.getElementById('track').classList.add('scrolling');
  if (_scrollTimer) clearTimeout(_scrollTimer);
  _scrollTimer = setTimeout(() => {
    document.getElementById('track').classList.remove('scrolling');
  }, 1800);
}, { passive: true });

// Suppress ghost hovers during touch scroll — iOS fires synthetic mouseenter
// at the finger-lift position. body.is-scrolling gates the hover CSS rules.
let _touchScrollTimer = null;
document.addEventListener('touchstart', () => {
  document.body.classList.add('is-scrolling');
}, { passive: true });
document.addEventListener('touchend', () => {
  clearTimeout(_touchScrollTimer);
  _touchScrollTimer = setTimeout(() => {
    document.body.classList.remove('is-scrolling');
  }, 300);
}, { passive: true });


// ══════════════════════════════
// PLACED MODE
// ══════════════════════════════
function updatePlacedMode() {
  document.body.classList.toggle('placed', window.innerWidth > window.innerHeight * 1.4);
}
window.addEventListener('resize', updatePlacedMode);
updatePlacedMode();

// ══════════════════════════════
// SERVICE ID RESOLVER
// Returns e.g. 'morning-service-thursday' for today's date.
// Used by both tick() and wireAudioDevTool().
// ══════════════════════════════
function resolveServiceId(periodId, date) {
  const day = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][date.getDay()];
  return periodId + '-' + day;
}

// ══════════════════════════════
// AMBIENT AUDIO
// ══════════════════════════════
function tickAmbientAudio(currentPeriod) {
  const periodId = currentPeriod?.id ?? null;
  if (periodId === _ambientPeriodId) return;

  // Period changed — stop old audio and clear pending flag unconditionally
  if (_ambientAudio) {
    _ambientAudio.pause();
    _ambientAudio = null;
  }
  _ambientPeriodId = periodId;
  _pendingAmbientPlay = false;

  const dot = document.getElementById('ambient-dot');

  // Only start if this period has audio
  if (!currentPeriod?.audio) {
    if (dot) dot.classList.toggle('playing', false);
    return;
  }

  _ambientAudio = new Audio(currentPeriod.audio);
  _ambientAudio.loop = true;
  _ambientAudio.muted = localStorage.getItem('gv-muted') === '1';
  _ambientAudio.play().catch(e => {
    console.warn('[ambient] play blocked, queuing for next gesture:', e);
    _pendingAmbientPlay = true;
  });

  if (dot) dot.classList.toggle('playing', !!_ambientAudio);
}

// ══════════════════════════════
// MAIN TICK
// ══════════════════════════════
function tick() {
  const now   = getNow();
  const state = getScheduleState(now);

  // Day-specific service routing — update serviceId on each tick so
  // Enter Service link and ambient audio always match today's recording
  const _mornSvc = SCHEDULE.find(p => p.id === 'morning-service');
  if (_mornSvc) _mornSvc.serviceId = resolveServiceId('morning-service', now);
  const _evenSvc = SCHEDULE.find(p => p.id === 'evening-service');
  if (_evenSvc) _evenSvc.serviceId = resolveServiceId('evening-service', now);

  // Quiet mode: dark inversion during 10pm–4:30am
  document.body.classList.toggle('quiet-mode', state.state === 'during' && state.period.type === 'quiet');

  updateClock(now);
  updateTickPosition(state);
  updateSidebar(state, now);
  tickAmbientAudio(state.state === 'during' ? state.period : null);

  if (_pendingAmbientPlay && _ambientAudio) {
    _ambientAudio.play()
      .then(() => {
        _pendingAmbientPlay = false;
        const dot = document.getElementById('ambient-dot');
        if (dot) dot.classList.add('playing');
      })
      .catch(() => {}); // silent — will retry next tick
  }

  // Rebuild only on period change — not every minute.
  // Row classes and clock DOM are stable within a period; only the period
  // identity crossing a boundary requires a full track rebuild.
  const nowId = state.state === 'during' ? state.period.id : null;
  if (!_trackEverBuilt || nowId !== _lastNowId) {
    buildTrack(state);
  }
}

tick();
window._scheduleTick = tick; // AudioEngine hooks in via this
setInterval(tick, 1000);

// Retry blocked ambient play on any user gesture — persistent, no-ops when nothing pending
// Also warms AudioContext so any tap anywhere keeps the Web Audio path healthy
document.addEventListener('click', function retryAmbient() {
  resumeAudioContext();
  if (_pendingAmbientPlay && _ambientAudio) {
    _ambientAudio.play()
      .then(() => {
        _pendingAmbientPlay = false;
        const dot = document.getElementById('ambient-dot');
        if (dot) dot.classList.add('playing');
        console.log('[ambient] retry succeeded');
      })
      .catch(e => console.warn('[ambient] retry failed:', e));
  }
});

// ══════════════════════════════
// WEB AUDIO SCHEDULING — overnight bell scheduler
// Schedules bell events via AudioContext so they fire after background/idle.
// Only type:'bell' periods are scheduled here — ambient loops (firewatch etc.)
// stay on the existing Audio() retry path and are not migrated.
// ══════════════════════════════
let _webAudioCtx    = null;
let _keepaliveAudio = null;

function startIOSKeepalive() {
  if (_keepaliveAudio) return; // already running
  _keepaliveAudio = new Audio('audio/sfzc/silence.mp3');
  _keepaliveAudio.loop = true;
  _keepaliveAudio.volume = 0;
  _keepaliveAudio.play().catch(() => {
    _keepaliveAudio = null; // silently fail — will be retried on next gesture
  });
}

function unlockAudioContext() {
  if (_webAudioCtx) return;
  try {
    _webAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) { console.warn('[WebAudio] AudioContext unavailable:', e); }
}

async function resumeAudioContext() {
  if (!_webAudioCtx) return;
  if (_webAudioCtx.state === 'suspended') {
    try { await _webAudioCtx.resume(); } catch (e) { console.warn('[WebAudio] resume failed:', e); }
  }
}

function scheduleAudioEvent(url, firesAt) {
  if (!_webAudioCtx) return;
  const msUntil = firesAt.getTime() - (Date.now() + _debugOffset);
  // TEMP DEBUG — remove after time-travel bell testing
  console.log('[WebAudio] scheduleAudioEvent', url.split('/').pop(),
    '| firesAt=', firesAt.toLocaleTimeString(),
    '| msUntil=', Math.round(msUntil / 1000) + 's',
    '| debugOffset=', Math.round(_debugOffset / 60000) + 'min');
  if (msUntil < 0) { console.log('[WebAudio] → SKIPPED (past)'); return; } // already past — skip silently

  setTimeout(async () => {
    try {
      await resumeAudioContext();
      const response = await fetch(url);
      const arrayBuffer = await response.arrayBuffer();
      const audioBuffer = await _webAudioCtx.decodeAudioData(arrayBuffer);
      const source = _webAudioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(_webAudioCtx.destination);
      console.log('[WebAudio] fire callback — muted=', localStorage.getItem('gv-muted'));
      if (localStorage.getItem('gv-muted') === '1') return; // respect mute for Web Audio path
      source.start(0); // play immediately — wall-clock setTimeout already handled the delay
    } catch (e) {
      console.warn('[WebAudio] scheduleAudioEvent failed for', url, ':', e);
    }
  }, msUntil);
}

// Builds a Date for today at h:m in debug time — single source for all bell scheduling.
function todayAt(h, m) {
  const d = new Date(getNow());
  d.setHours(h, m, 0, 0);
  return d;
}

function scheduleUpcomingBells() {
  // TEMP DEBUG
  console.log('[scheduleUpcomingBells] called | getNow()=', getNow().toLocaleTimeString(), '| _webAudioCtx=', !!_webAudioCtx);
  if (!_webAudioCtx) return;
  const now = getNow();

  // audio: — type:'bell' periods scheduled via Web Audio (wake-up, han)
  for (const period of SCHEDULE) {
    if (!period.audio) continue;
    if (period.type !== 'bell') continue; // skip ambient loops (type:'quiet' firewatch etc.)
    const firesAt = todayAt(period.time[0], period.time[1]);
    if (firesAt <= now) continue;
    console.log('[WebAudio] scheduling', period.id, 'at', firesAt.toLocaleTimeString());
    scheduleAudioEvent(period.audio, firesAt);
  }

  // bell: — one-shot bell at period start
  for (const period of SCHEDULE) {
    if (!period.bell) continue;
    const firesAt = todayAt(period.time[0], period.time[1]);
    if (firesAt <= now) continue;
    console.log('[WebAudio] scheduling bell for', period.id, 'at', firesAt.toLocaleTimeString());
    scheduleAudioEvent(period.bell, firesAt);
  }

  // bellEnd: — one-shot bell at period end
  for (const period of SCHEDULE) {
    if (!period.bellEnd) continue;
    const firesAt = todayAt(period.end[0], period.end[1]);
    if (firesAt <= now) continue;
    console.log('[WebAudio] scheduling bellEnd for', period.id, 'at', firesAt.toLocaleTimeString());
    scheduleAudioEvent(period.bellEnd, firesAt);
  }

  // Work-afternoon end bell — 14:55, fires before period end (15:00) — not expressible as bellEnd:
  // Future: consider sub-period offset field if this pattern recurs.
  if (SCHEDULE.some(p => p.id === 'work-afternoon')) {
    const firesAt = todayAt(14, 55);
    if (firesAt > now) {
      console.log('[WebAudio] scheduling railroad-bell work-afternoon end at', firesAt.toLocaleTimeString());
      scheduleAudioEvent('audio/sfzc/railroad-bell.mp3', firesAt);
    }
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && _webAudioCtx) {
    resumeAudioContext();
    scheduleUpcomingBells(); // safe — already-past events skipped by msUntil < 0 check
  }
});

function scheduleMidnightReschedule() {
  const now = getNow();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0); // next midnight
  const msUntilMidnight = midnight.getTime() - now.getTime();

  setTimeout(() => {
    scheduleUpcomingBells();
    scheduleMidnightReschedule(); // set up the next night's reschedule
  }, msUntilMidnight);
}
</script>

/* ══════════════════════════════════════════════════════════
   AUDIO ENGINE
   ══════════════════════════════════════════════════════════ */
const AudioEngine = (() => {

  const BASE = 'audio/sfzc/';

  const AUDIO_FILES = {
    han:    BASE + 'temple_sounds-the_han.mp3',
    densho: BASE + 'temple_sounds-the_densho_bell.mp3',
  };

  /* ── AudioContext health check ──────────────────────────────
     iOS can suspend the audio session overnight even with wake lock.
     Keep one AudioContext alive and attempt resume() on each tick
     so that subsequent play() calls have a chance to succeed. */
  let _audioCtx = null;
  function _checkAudioContext() {
    try {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (_audioCtx.state === 'suspended') {
        _audioCtx.resume()
          .then(() => console.log('[AudioEngine] AudioContext resumed from suspended'))
          .catch(err => console.warn('[AudioEngine] AudioContext resume failed:', err.name, err.message));
      }
    } catch (e) { /* API unavailable */ }
  }

  const SERVICE_AUDIO = {
    'morning-service-monday':  BASE + 'MorningService_Monday.mp4',
    'morning-service-tuesday': BASE + 'MorningService_Tuesday.mp4',
  };

  const HAN_LEAD_MINUTES = 15;
  const AMBIENT_VOLUME   = 0.33;
  const FADE_DURATION_MS = 3000;

  let hanAudio        = null;
  let ambientAudio    = null;
  let denshoAudio     = null;
  let hanDuration     = null;
  let hanTriggeredFor = null;
  let activeServiceId = null;
  let lastPeriodId    = null;

  function nowSeconds() {
    const d = getNow();
    return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
  }

  function periodStartSeconds(period) { return period.time[0] * 3600 + period.time[1] * 60; }
  function periodEndSeconds(period)   { return period.end[0]  * 3600 + period.end[1]  * 60; }

  function getAudio(src) {
    const a = new Audio(src);
    a.preload = 'metadata';
    return a;
  }

  function fadeIn(audioEl, targetVolume, durationMs) {
    if (!audioEl) return;
    audioEl.volume = 0;
    const steps = 30, stepMs = durationMs / steps, stepVol = targetVolume / steps;
    let step = 0;
    const id = setInterval(() => {
      step++;
      audioEl.volume = Math.min(targetVolume, stepVol * step);
      if (step >= steps) clearInterval(id);
    }, stepMs);
  }

  function stopAndClear(audioEl) {
    if (!audioEl) return null;
    audioEl.pause();
    audioEl.src = '';
    return null;
  }

  function applyMute() {
    console.log('[mute] applyMute called, isMuted=', isMuted);
    console.log('[mute] ambientAudio=', ambientAudio, 'muted=', ambientAudio?.muted);
    console.log('[mute] _ambientAudio exists=', typeof _ambientAudio !== 'undefined', _ambientAudio);
    if (ambientAudio) ambientAudio.muted = isMuted;
    if (hanAudio)     hanAudio.muted     = isMuted;
    if (denshoAudio)  denshoAudio.muted  = isMuted;
    if (wakeupAudio)  wakeupAudio.muted  = isMuted;
    if (typeof _ambientAudio !== 'undefined' && _ambientAudio) {
      console.log('[mute] setting _ambientAudio.muted =', isMuted);
      _ambientAudio.muted = isMuted;
    } else {
      console.log('[mute] _ambientAudio not reachable');
    }
    if (typeof _devAudio !== 'undefined' && _devAudio) _devAudio.muted = isMuted;
  }

  /* ── Han ── */
  function getHanTarget() {
    const now = nowSeconds();
    for (const period of SCHEDULE) {
      // Trigger han before zazen periods and before any period flagged hanBefore: true
      if (period.type !== 'zazen' && !period.hanBefore) continue;
      const start = periodStartSeconds(period);
      const windowStart = start - HAN_LEAD_MINUTES * 60;
      if (now >= windowStart && now < start) return { period, elapsed: now - windowStart };
    }
    return null;
  }

  function tickHan() {
    const target = getHanTarget();
    if (!target) {
      if (hanAudio) { hanAudio = stopAndClear(hanAudio); hanTriggeredFor = null; }
      return;
    }
    const { period, elapsed } = target;
    if (hanTriggeredFor === period.id && hanAudio && !hanAudio.paused) return;

    hanTriggeredFor = period.id;
    hanAudio = getAudio(AUDIO_FILES.han);
    hanAudio.muted = isMuted;

    hanAudio.addEventListener('loadedmetadata', () => {
      hanDuration = hanAudio.duration;
      const windowDuration = HAN_LEAD_MINUTES * 60;
      if (hanDuration >= windowDuration - 5) {
        hanAudio.currentTime = Math.min(elapsed, hanDuration - 1);
        hanAudio.loop = false;
      } else {
        hanAudio.loop = true;
        hanAudio.currentTime = elapsed % hanDuration;
      }
      hanAudio.play().catch(err => {
        console.warn('[AudioEngine] han play() failed:', err.name, err.message);
        document.addEventListener('click', () => {
          if (hanAudio) hanAudio.play().catch(e => console.warn('[AudioEngine] han retry failed:', e.name, e.message));
        }, { once: true });
      });
    }, { once: true });
    hanAudio.load();
  }

  /* ── Ambient service ── */
  function tickAmbient(currentState) {
    // state.state === 'during' is the active-period signal in this codebase
    if (!currentState || currentState.state !== 'during') {
      if (ambientAudio) { ambientAudio = stopAndClear(ambientAudio); activeServiceId = null; }
      return;
    }

    const period = currentState.period;
    if (!period.hasService || !SERVICE_AUDIO[period.serviceId]) {
      if (ambientAudio) { ambientAudio = stopAndClear(ambientAudio); activeServiceId = null; }
      return;
    }

    if (activeServiceId === period.serviceId && ambientAudio && !ambientAudio.paused) return;

    if (ambientAudio) stopAndClear(ambientAudio);
    activeServiceId = period.serviceId;
    ambientAudio = getAudio(SERVICE_AUDIO[period.serviceId]);
    ambientAudio.volume = 0;
    ambientAudio.muted = isMuted;

    const elapsedSeconds = nowSeconds() - periodStartSeconds(period);
    ambientAudio.addEventListener('loadedmetadata', () => {
      const seekTo = Math.min(Math.max(elapsedSeconds, 0), ambientAudio.duration - 1);
      ambientAudio.currentTime = seekTo;
      ambientAudio.play().then(() => {
        fadeIn(ambientAudio, AMBIENT_VOLUME, FADE_DURATION_MS);
      }).catch(err => {
        console.warn('[AudioEngine] ambient play() failed:', err.name, err.message);
        document.addEventListener('click', () => {
          if (ambientAudio) ambientAudio.play().then(() => {
            fadeIn(ambientAudio, AMBIENT_VOLUME, FADE_DURATION_MS);
          }).catch(e => console.warn('[AudioEngine] ambient retry failed:', e.name, e.message));
        }, { once: true });
      });
    }, { once: true });
    ambientAudio.load();
  }

  document.addEventListener('visibilitychange', () => {
    if (!ambientAudio) return;
    if (document.hidden) {
      ambientAudio.pause();
    } else {
      if (activeServiceId) {
        const period = SCHEDULE.find(p => p.serviceId === activeServiceId);
        if (period) {
          const elapsed = nowSeconds() - periodStartSeconds(period);
          if (elapsed >= 0 && elapsed < ambientAudio.duration) ambientAudio.currentTime = elapsed;
        }
      }
      ambientAudio.play().catch(err => console.warn('[AudioEngine] ambient visibilitychange resume failed:', err.name, err.message));
    }
  });

  /* ── Period transition bell ── */
  let firstTick = true;

  function tickBell(currentPeriodId) {
    if (firstTick) { firstTick = false; lastPeriodId = currentPeriodId; return; }
    if (currentPeriodId && currentPeriodId !== lastPeriodId) {
      lastPeriodId = currentPeriodId;
      playDensho();
    }
  }

  function playDensho() {
    if (denshoAudio && !denshoAudio.ended) return;
    denshoAudio = getAudio(AUDIO_FILES.densho);
    denshoAudio.volume = 1;
    denshoAudio.muted = isMuted;
    denshoAudio.play().catch(err => console.warn('[AudioEngine] densho play() failed:', err.name, err.message));
  }

  /* ── Wake-up bell — plays once at period start, no loop ── */
  let wakeupPlaying = false;
  let wakeupAudio   = null;

  function tickWakeup(state) {
    if (state && state.state === 'during' && state.period.id === 'wake-up-bell') {
      if (!wakeupPlaying) {
        wakeupAudio = new Audio('audio/sfzc/koten-and-shinrei-wakeup.mp3');
        wakeupAudio.volume = isMuted ? 0 : 0.8;
        wakeupAudio.muted  = isMuted;
        console.log('[wakeupAudio] playing — isMuted=', isMuted);
        wakeupAudio.play().catch(err => console.warn('[AudioEngine] wakeup play() failed:', err.name, err.message));
        wakeupPlaying = true;
      }
    } else {
      wakeupPlaying = false;
      if (wakeupAudio && !wakeupAudio.ended) { wakeupAudio.pause(); wakeupAudio = null; }
    }
  }

  /* ── Enter Service ?t= handoff ── */
  function updateEnterServiceLink() {
    const btn = document.querySelector('[data-enter-service]')
             || document.querySelector('a[href*="service="]');
    if (!btn) return;
    const href  = btn.getAttribute('href') || '';
    const match = href.match(/service=([^&]+)/);
    if (!match) return;
    const period = SCHEDULE.find(p => p.serviceId === match[1]);
    if (!period) return;
    const elapsed = Math.max(0, nowSeconds() - periodStartSeconds(period));
    btn.href = `${href.split('?')[0]}?service=${match[1]}&t=${Math.floor(elapsed)}`;
  }

  /* ── Mobile clock ── */
  function updateMobileClock() {
    const mobileClock = document.getElementById('mobile-clock');
    if (!mobileClock) return;
    const now = getNow();
    const h = now.getHours() % 12 || 12; // 12h, no padding
    const m = String(now.getMinutes()).padStart(2, '0');
    mobileClock.textContent = `${h}:${m}`;

    const mobileNext = document.getElementById('mobile-next');
    if (mobileNext) {
      // state.next is the next period in this codebase (not state.nextPeriod)
      const state = getScheduleState(getNow());
      if (state && state.next) {
        const nextMin = state.next.time[0] * 60 + state.next.time[1];
        const nowMin  = now.getHours() * 60 + now.getMinutes();
        const diff    = nextMin - nowMin;
        if (diff > 0) {
          const hh = Math.floor(diff / 60), mm = diff % 60;
          mobileNext.textContent = `${hh > 0 ? hh + 'h ' : ''}${mm}m · ${state.next.name}`;
        }
      }
    }
  }

  function isServiceAvailable(serviceId) {
    return Object.prototype.hasOwnProperty.call(SERVICE_AUDIO, serviceId);
  }

  /* ── Main tick ── */
  function tick() {
    _checkAudioContext();
    // state.state === 'during' is active-period in this codebase
    const state = typeof getScheduleState === 'function' ? getScheduleState(getNow()) : null;
    const currentPeriodId = state && state.state === 'during' ? state.period.id : null;

    tickWakeup(state);
    tickHan();
    tickAmbient(state);
    tickBell(currentPeriodId);
    updateEnterServiceLink();
    updateMobileClock();
  }

  function init() {
    const originalTick = window._scheduleTick;
    if (typeof originalTick === 'function') {
      window._scheduleTick = () => { originalTick(); tick(); };
    } else {
      setInterval(tick, 1000);
    }
    tick();
  }

  /* ── iOS audio unlock ── */
  /* Plays and immediately pauses a silent audio element to satisfy iOS's
     "audio must be initiated by user gesture" requirement. Call once from
     a tap handler, before any scheduled audio needs to play. */
  function unlock() {
    const silent = new Audio();
    silent.src = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAACAAACcQCAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICA//////////////////////////////////////////////////////////////////8AAAA5TGFMZTU4LjI5LjEwMAAAAAAAAAAUgAAAAAAAAAJxKr0QAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//OEZAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA////////////////////////////////////////////////////////////////////////AAAAAExhdmY1OC4yOS4xMDAAAAAAAAAAAACQAAAAAAAAAnEqvRAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=';
    silent.volume = 0;
    silent.play().then(() => { silent.pause(); }).catch(() => {});
  }

  return { init, tick, applyMute, unlock, isServiceAvailable };

})();

/* ── Boot ── */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', AudioEngine.init);
} else {
  AudioEngine.init();
}

/* ── Screen Wake Lock ──
   Prevents the screen from sleeping while the tab is active.
   Re-acquired on visibility restore (e.g. after phone wake).
   Fails silently on unsupported browsers. ── */
const WakeLock = (() => {
  let lock = null;

  async function request() {
    if (!('wakeLock' in navigator)) return;
    try {
      lock = await navigator.wakeLock.request('screen');
      lock.addEventListener('release', () => { lock = null; });
    } catch (e) { /* denied or interrupted — non-fatal */ }
  }

  function onVisibilityChange() {
    if (document.visibilityState === 'visible') request();
  }

  return { request, onVisibilityChange };
})();

document.addEventListener('visibilitychange', WakeLock.onVisibilityChange);

/* ── iOS first-visit audio activation overlay ──
   Touch devices only. sessionStorage prevents repeat on refresh.
   Tap unlocks the iOS audio context, then dismisses. ── */
(function () {
  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (!isTouchDevice) return;
  if (sessionStorage.getItem('gv-audio-unlocked')) return;

  const overlay = document.createElement('div');
  overlay.id = 'audio-unlock-overlay';
  overlay.style.cssText = [
    'position:fixed', 'top:0', 'left:0', 'right:0', 'bottom:0', 'z-index:1000',
    'background:#f4f0e8',   /* --paper */
    'display:flex', 'flex-direction:column',
    'align-items:center', 'justify-content:center',
    'cursor:pointer',
    'transition:opacity 0.4s ease',
  ].join(';');

  overlay.innerHTML = `
    <span style="
      font-family:'Cormorant',serif;
      font-size:24px;
      font-weight:400;
      color:#1a1814;
      letter-spacing:-0.01em;
      opacity:0.82;
      pointer-events:none;
    ">Tap to enter</span>
    <span style="
      font-family:'IBM Plex Mono',monospace;
      font-size:9px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color:#1a1814;
      opacity:0.3;
      margin-top:14px;
      pointer-events:none;
    ">Great Vows · SFZC</span>
  `;

  overlay.addEventListener('click', function () {
    AudioEngine.unlock();
    unlockAudioContext();       // create Web Audio context on first gesture
    startIOSKeepalive();        // silent loop keeps iOS audio session alive overnight
    scheduleUpcomingBells();   // schedule all remaining bell events for today
    scheduleMidnightReschedule(); // queue reschedule at midnight for next day
    WakeLock.request(); // user gesture — same tap acquires wake lock
    sessionStorage.setItem('gv-audio-unlocked', '1');
    overlay.style.opacity = '0';
    setTimeout(function () { overlay.remove(); }, 420);
  }, { once: true });

  document.body.appendChild(overlay);
}());
</script>
